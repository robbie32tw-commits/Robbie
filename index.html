                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:12,fontFamily:'var(--mono)',fontWeight:600}}>{fmt(sub)}</span>
                      </div>
                    </div>
                    {items.map((a,i)=>(
                      <div key={a.id} style={{padding:'10px 12px',background:'var(--surface)',border:'1px solid var(--border)',borderTop:'none',borderRadius:i===items.length-1?'0 0 10px 10px':0}}>
                        <div style={{display:'flex',alignItems:'center',gap:10}}>
                          <div style={{flex:1}}>
                            <p style={{fontSize:13,fontWeight:500}}>{a.name}</p>
                            <div style={{display:'flex',gap:8,alignItems:'center'}}>
                              {a.note&&<p style={{fontSize:11,color:'var(--text3)'}}>{a.note}</p>}
                              {a.updatedAt&&<p title={((new Date()-new Date(a.updatedAt))/(864e5))>30?'超過 30 天未更新，建議重新確認金額是否正確':undefined} style={{fontSize:10,color:((new Date()-new Date(a.updatedAt))/(864e5))>30?'var(--red)':'var(--text3)',cursor:((new Date()-new Date(a.updatedAt))/(864e5))>30?'help':'default'}}>更新於 {a.updatedAt}</p>}
                            </div>
                          </div>
                          <span style={{fontSize:13,fontFamily:'var(--mono)'}}>{fmt(a.amount)}</span>
                          <button onClick={()=>setModal({type:'assetHist',item:a,isLiab:false})} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--text3)',padding:4}} title="歷史紀錄">📊</button>
                          <button onClick={()=>setModal({type:'asset',item:a})} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--text3)',padding:4}}>✏️</button>
                          <button onClick={()=>delAsset(a.id,false)} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--text3)',padding:4}}>🗑</button>
                        </div>
                        <div style={{marginTop:6,height:3,background:'var(--surface2)',borderRadius:2,overflow:'hidden'}}>
                          <div style={{width:`${totalAssets>0?(a.amount/totalAssets*100):0}%`,height:'100%',background:meta.color,borderRadius:2,opacity:0.6}}/>
                        </div>
                      </div>
                    ))}
                  </div>;
                })}
                <div style={{padding:'10px 12px',background:'var(--green-bg)',borderRadius:10,display:'flex',justifyContent:'space-between'}}>
                  <span style={{fontWeight:600,color:'var(--green)'}}>資產合計</span>
                  <span style={{fontFamily:'var(--mono)',fontWeight:700,color:'var(--green)',fontSize:16}}>{fmt(totalAssets)}</span>
                </div>
              </div>

              {/* Liabilities */}
              <div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <span style={{fontWeight:600,fontSize:14}}>負債 <span style={{color:'var(--text3)',fontWeight:400}}>({liabilities.length}項)</span></span>
                  <button onClick={()=>setModal({type:'liab'})} style={{padding:'6px 14px',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer',fontSize:12,background:'var(--surface)',fontWeight:500}}>+ 新增</button>
                </div>
                {['loan','private_loan','credit'].map(cat=>{
                  const items=liabilities.filter(l=>l.category===cat); if(!items.length) return null;
                  const meta=CAT_META[cat], sub=items.reduce((s,l)=>s+l.amount,0);
                  return <div key={cat} style={{marginBottom:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:'var(--surface2)',borderRadius:'10px 10px 0 0',border:'1px solid var(--border)',borderBottom:'none'}}>
                      <span style={{fontSize:12,fontWeight:600,color:'var(--text2)'}}>{meta.icon} {meta.label}</span>
                      <span style={{fontSize:12,fontFamily:'var(--mono)',fontWeight:600}}>{fmt(sub)}</span>
                    </div>
                    {items.map((l,i)=>(
                      <div key={l.id} style={{padding:'10px 12px',background:'var(--surface)',border:'1px solid var(--border)',borderTop:'none',borderRadius:i===items.length-1?'0 0 10px 10px':0}}>
                        <div style={{display:'flex',alignItems:'center',gap:10}}>
                          <div style={{flex:1}}>
                            <p style={{fontSize:13,fontWeight:500}}>{l.name}</p>
                            <div style={{display:'flex',gap:8,alignItems:'center'}}>
                              {l.note&&<p style={{fontSize:11,color:'var(--text3)'}}>{l.note}</p>}
                              {l.updatedAt&&<p title={((new Date()-new Date(l.updatedAt))/(864e5))>30?'超過 30 天未更新，建議重新確認金額是否正確':undefined} style={{fontSize:10,color:((new Date()-new Date(l.updatedAt))/(864e5))>30?'var(--red)':'var(--text3)',cursor:((new Date()-new Date(l.updatedAt))/(864e5))>30?'help':'default'}}>更新於 {l.updatedAt}</p>}
                            </div>
                          </div>
                          <span style={{fontSize:13,fontFamily:'var(--mono)',color:'var(--red)'}}>{fmt(l.amount)}</span>
                          <button onClick={()=>setModal({type:'assetHist',item:l,isLiab:true})} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--text3)',padding:4}} title="歷史紀錄">📊</button>
                          <button onClick={()=>setModal({type:'liab',item:l})} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--text3)',padding:4}}>✏️</button>
                          <button onClick={()=>delAsset(l.id,true)} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--text3)',padding:4}}>🗑</button>
                        </div>
                        <div style={{marginTop:6,height:3,background:'var(--surface2)',borderRadius:2,overflow:'hidden'}}>
                          <div style={{width:`${totalLiab>0?(l.amount/totalLiab*100):0}%`,height:'100%',background:'var(--red)',borderRadius:2,opacity:0.5}}/>
                        </div>
                      </div>
                    ))}
                  </div>;
                })}
                <div style={{padding:'10px 12px',background:'var(--red-bg)',borderRadius:10,display:'flex',justifyContent:'space-between'}}>
                  <span style={{fontWeight:600,color:'var(--red)'}}>負債合計</span>
                  <span style={{fontFamily:'var(--mono)',fontWeight:700,color:'var(--red)',fontSize:16}}>{fmt(totalLiab)}</span>
                </div>
              </div>
            </div>

            <Card style={{background:'var(--text)',color:'white'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div><p style={{fontSize:12,opacity:0.5,marginBottom:6}}>淨資產 = 總資產 − 總負債</p><div style={{fontSize:28,fontWeight:700,fontFamily:'var(--mono)',letterSpacing:'-0.5px'}}>{fmt(netWorth)}</div></div>
                <div style={{textAlign:'right'}}><p style={{fontSize:11,opacity:0.4,marginBottom:4}}>負債比率</p><div style={{fontSize:22,fontWeight:700,fontFamily:'var(--mono)'}}>{totalAssets>0?((totalLiab/totalAssets)*100).toFixed(1):0}%</div></div>
              </div>
              <div style={{marginTop:16,height:6,background:'rgba(255,255,255,0.1)',borderRadius:3,overflow:'hidden'}}>
                <div style={{width:`${totalAssets>0?Math.min((totalLiab/totalAssets)*100,100):0}%`,height:'100%',background:'rgba(255,255,255,0.4)',borderRadius:3,transition:'width 0.5s'}}/>
              </div>
            </Card>
          </div>
        )}

        {/* ── Ledger ── */}
        {/* ── Investment ── */}
        {tab==='weekly'&&(
          <WeeklyTab assets={assets} liabilities={liabilities} assetHistory={assetHistory} 
            onAddSnapshot={()=>setModal({type:'snapshot'})}
            onEditSnapshot={d=>setModal({type:'snapshot', editDate:d})}
            onEditSnapshotDate={(oldDate, newDate)=>{
              setAssetHistory(h=>h.map(r=>r.date===oldDate ? {...r, date:newDate} : r));
            }} />
        )}

        {tab==='investment'&&(
          <InvestmentTab
            investments={investments}
            assets={assets}
            liabilities={liabilities}
            assetHistory={assetHistory}
            fxRate={fxRate}
            setFxRate={setFxRate}
            onAdd={()=>setModal({type:'inv'})}
            onEdit={inv=>setModal({type:'inv',item:inv})}
            onDelete={id=>setInvestments(p=>p.filter(x=>x.id!==id))}
            onUpdatePrices={priceMap=>setInvestments(p=>p.map(i=>priceMap[i.id]!=null?{...i,currentPrice:priceMap[i.id]}:i))}
          />
        )}

        {/* ── Realized PnL ── */}
        {tab==='pnl'&&(
          <RealizedPnlTab
            records={realizedPnl}
            onAdd={()=>setModal({type:'realized_pnl'})}
            onEdit={r=>setModal({type:'realized_pnl',item:r})}
            onDelete={id=>setRealizedPnl(p=>p.filter(x=>x.id!==id))}
          />
        )}

        {/* ── Stable Assets ── */}
        {tab==='stable'&&(
          <StableAssetTab
            items={stableAssets}
            onAdd={cat=>setModal({type:'stable',defaultCat:cat})}
            onEdit={itm=>setModal({type:'stable',item:itm})}
            onDelete={id=>setStableAssets(p=>p.filter(x=>x.id!==id))}
          />
        )}

        {/* ── Cash (收入記帳 + 繳款紀錄) ── */}
        {tab==='cash'&&(
          <CashTab
            incomeRecords={incomeRecords}
            onAddIncome={cat=>setModal({type:'income',defaultCat:cat})}
            onEditIncome={r=>setModal({type:'income',item:r})}
            onDeleteIncome={id=>setTransactions(p=>p.filter(x=>x.id!==id))}
            paymentRecords={paymentRecords}
            onAddPayment={cat=>setModal({type:'payment',defaultCat:cat})}
            onEditPayment={r=>setModal({type:'payment',item:r})}
            onDeletePayment={id=>setPaymentRecords(p=>p.filter(x=>x.id!==id))}
            onTogglePayment={id=>setPaymentRecords(p=>p.map(x=>x.id===id?{...x,status:x.status==='paid'?'pending':'paid'}:x))}
            recurringPayments={recurringPayments}
            onAddRecurringItem={()=>setModal({type:'recurring_item'})}
            onEditRecurringItem={rc=>setModal({type:'recurring_item',item:rc})}
            onDeleteRecurring={id=>setRecurringPayments(p=>p.filter(x=>x.id!==id))}
            onCreateThisMonth={rc=>{
              const now=new Date();
              const y=now.getFullYear(), mo=String(now.getMonth()+1).padStart(2,'0');
              const day=String(Math.min(rc.dueDay,new Date(y,now.getMonth()+1,0).getDate())).padStart(2,'0');
              setPaymentRecords(p=>[...p,{id:Date.now(),name:rc.name,category:rc.category,amount:rc.amount,status:'pending',date:`${y}-${mo}-${day}`,note:rc.note||''}]);
            }}
          />
        )}

        {/* ── Analysis ── */}
        {tab==='analysis'&&(
          <div style={{maxWidth:1140,margin:'0 auto'}}>
            <AnalysisTab
              transactions={transactions}
              txSearch={txSearch} onTxSearchChange={e=>setTxSearch(e.target.value)}
              isHighOnly={isHighOnly} onHighOnlyToggle={()=>setIsHighOnly(!isHighOnly)}
              onAddTx={()=>setModal({type:'tx'})}
              onEditTx={t=>setModal({type:'tx',item:t})}
              onDelTx={delTx}
              onAddPayment={t=>setModal({type:'payment',item:t})}
              onImportInvoice={()=>setModal({type:'invoice'})}
              onImportCSV={()=>setModal({type:'csv'})}
              exportCSV={exportCSV}
              showInvBanner={showInvBanner}
              lastInvoice={lastInvoice}
              carrierCode={carrierCode}
              onSetCarrier={()=>{const code=prompt('手機載具條碼（如 /ABC+123）：',carrierCode);if(code!==null){localStorage.setItem('hj_carrier',code);setCarrierCode(code);}}}
              onDismissInvBanner={()=>setShowInvBanner(false)}
            />
          </div>
        )}
        {tab==='ai'&&(
          <div style={{maxWidth:900,margin:'0 auto'}}>
            <AIAdvisorPanel transactions={transactions} assets={assets} liabilities={liabilities}/>
          </div>
        )}
      </main>

      {/* FAB */}
      <button className="fab" onClick={()=>setModal({type:'ai'})}>🤖</button>
      <div className="fab-label">AI 記帳</div>

      {/* Modals */}
      {modal?.type==='ai'&&<AIBookkeeperModal
        onAdd={tx=>{if(tx._needsConfirm){setModal({type:'tx',item:tx});}else{setTransactions(t=>[tx,...t]);}}}
        onAddAsset={a=>{setAssets(p=>[...p,a]); setAssetHistory(h=>[...h,{id:Date.now()+1,assetId:a.id,isLiab:false,name:a.name,amount:a.amount,date:a.updatedAt}]);}}
        onAddLiab={l=>{setLiabilities(p=>[...p,l]); setAssetHistory(h=>[...h,{id:Date.now()+2,assetId:l.id,isLiab:true,name:l.name,amount:l.amount,date:l.updatedAt}]);}}
        onClose={()=>setModal(null)}/>}
      {modal?.type==='data'&&<DataModal db={{assets,liabilities,transactions,investments,stableAssets,incomeRecords,paymentRecords,assetHistory,realizedPnl}} onImport={importFullDB} onMerge={mergeFullDB} onClose={()=>setModal(null)}/>}
      {modal?.type==='asset'&&<AssetModal item={modal.item} isLiab={false} onSave={i=>saveAsset(i,false)} onClose={()=>setModal(null)}/>}
      {modal?.type==='liab'&&<AssetModal item={modal.item} isLiab={true} onSave={i=>saveAsset(i,true)} onClose={()=>setModal(null)}/>}
      {modal?.type==='tx'&&<TxModal item={modal.item} onSave={saveTx} onClose={()=>setModal(null)}/>}
      {modal?.type==='csv'&&<CSVModal onImport={importTxs} onClose={()=>setModal(null)}/>}
      {modal?.type==='assetHist'&&<AssetHistoryModal
        item={modal.item} isLiab={modal.isLiab} history={assetHistory}
        onAddHistory={r=>setAssetHistory(h=>[...h,r])}
        onDeleteHistory={id=>setAssetHistory(h=>h.filter(r=>r.id!==id))}
        onClose={()=>setModal(null)}/>}
      {modal?.type==='snapshot'&&<HistorySnapshotModal
        assets={assets} liabilities={liabilities} history={assetHistory} editDate={modal.editDate}
        onSave={(entries, targetDate)=>{ 
          setAssetHistory(h=>{
             const clean = h.filter(x => x.date !== targetDate);
             return [...clean, ...entries];
          }); 
          setModal(null); 
        }}
        onClose={()=>setModal(null)}/>}
      {modal?.type==='inv'&&<InvestmentModal item={modal.item} fxRate={fxRate} onSave={inv=>{setInvestments(p=>inv.id?p.map(x=>x.id===inv.id?inv:x):[...p,{...inv,id:Date.now()}]);setModal(null);}} onClose={()=>setModal(null)}/>}
      {modal?.type==='realized_pnl'&&<RealizedPnlModal item={modal.item} defaultFxRate={fxRate} onSave={r=>{setRealizedPnl(p=>r.id&&p.some(x=>x.id===r.id)?p.map(x=>x.id===r.id?r:x):[...p,r]);setModal(null);}} onClose={()=>setModal(null)}/>}
      {modal?.type==='stable'&&<StableItemModal item={modal.item} defaultCat={modal.defaultCat} onSave={itm=>{setStableAssets(p=>itm.id?p.map(x=>x.id===itm.id?itm:x):[...p,{...itm,id:Date.now()}]);setModal(null);}} onClose={()=>setModal(null)}/>}
      {modal?.type==='income'&&<IncomeModal item={modal.item} defaultCat={modal.defaultCat} onSave={r=>{
        const rec = {...r, id:r.id||Date.now(), type:'income', amount:parseFloat(r.amount)||0};
        setTransactions(p=>rec.id&&p.some(x=>x.id===rec.id) ? p.map(x=>x.id===rec.id?rec:x) : [...p,rec]);
        setModal(null);
      }} onClose={()=>setModal(null)}/>}
      {modal?.type==='payment'&&<PaymentModal item={modal.item} defaultCat={modal.defaultCat} onSave={r=>{setPaymentRecords(p=>r.id?p.map(x=>x.id===r.id?r:x):[...p,{...r,id:Date.now()}]);setModal(null);}} onClose={()=>setModal(null)}/>}
      {modal?.type==='recurring_item'&&<RecurringItemModal item={modal.item} onSave={rc=>{setRecurringPayments(p=>rc.id?p.map(x=>x.id===rc.id?rc:x):[...p,{...rc,id:Date.now()}]);setModal(null);}} onClose={()=>setModal(null)}/>}
      {modal?.type==='invoice'&&<InvoiceModal onImport={rows=>importTxs(rows,true)} onClose={()=>setModal(null)}/>}
      {modal?.type==='migrate'&&<MigrateStocksModal
        assets={assets} fxRate={fxRate}
        onMigrate={(newInvs, removeAssetIds)=>{
          const ts = Date.now();
          setInvestments(p=>[...p, ...newInvs.map((inv,i)=>({
            ...inv, id: ts+i,
            costPrice:    inv.category==='us_stock' ? parseFloat(((inv.usdCostPrice||0)*fxRate).toFixed(0))    : inv.costPrice,
            currentPrice: inv.category==='us_stock' ? parseFloat(((inv.usdCurrentPrice||0)*fxRate).toFixed(0)) : inv.currentPrice,
          }))]);
          setAssets(a=>a.filter(x=>!removeAssetIds.includes(x.id)));
          setModal(null);
          alert(`✅ 已遷移 ${newInvs.length} 筆到投資組合，並從資產移除。`);
        }}
        onClose={()=>setModal(null)}/>}

      {/* Tweaks */}
      {tweakOpen&&(
        <div style={{position:'fixed',bottom:24,right:24,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:16,padding:20,width:240,boxShadow:'0 8px 32px rgba(0,0,0,0.12)',zIndex:500}}>
          <p style={{fontWeight:600,fontSize:13,marginBottom:14}}>Tweaks</p>
          <Field label="主色調 (Hue)"><input type="range" min="0" max="360" defaultValue="200" style={{width:'100%'}} onChange={e=>document.documentElement.style.setProperty('--accent',`oklch(52% 0.14 ${e.target.value})`)}/></Field>
          <Field label="字體大小"><input type="range" min="12" max="18" defaultValue="14" style={{width:'100%'}} onChange={e=>document.body.style.fontSize=e.target.value+'px'}/></Field>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
