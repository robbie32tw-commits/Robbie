async function callClaude(messages) {
  let key = localStorage.getItem('hj_apikey') || '';
  if (!key) {
    key = prompt('請輸入 Google Gemini API Key（將儲存於本機）：') || '';
    if (!key) throw new Error('未提供 API Key');
    localStorage.setItem('hj_apikey', key);
  }
  const contents = messages.map(m => {
    const parts = [];
    if (m.image) parts.push({ inlineData: { mimeType: m.image.mimeType, data: m.image.data } });
    parts.push({ text: m.content });
    return { role: m.role === 'assistant' ? 'model' : 'user', parts };
  });
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ contents }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

const fmt = (n) => new Intl.NumberFormat('zh-TW', { style:'currency', currency:'TWD', maximumFractionDigits:0 }).format(n);
const today = () => new Date().toISOString().split('T')[0];
const getMonths = (n=6) => {
  const now = new Date();
  return Array.from({length:n}, (_,i) => {
    const d = new Date(now.getFullYear(), now.getMonth()-(n-1)+i, 1);
    return { key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`, label:`${d.getMonth()+1}月` };
  });
};

const autoCategory = (name) => { for (const r of INV_RULES) { if (r.kw.some(k => name.includes(k))) return r.cat; } return '其他支出'; };
const parseInvoiceCSV = (raw) => {
  const lines = raw.trim().split('\n');
  const header = lines[0].replace(/\r/,'');
  const isGov = header.includes('賣方名稱') || header.includes('消費日期');
  return lines.slice(1).map((line, i) => {
    const cols = line.replace(/\r/,'').split(',').map(c => c.trim().replace(/^"|"$/g,''));
    let date, seller, amount;
    if (isGov) { date = cols[0]?.replace(/\//g,'-'); seller = cols[3] || cols[1] || '未知'; amount = parseFloat(cols[4])||0; }
    else { date = cols[0]?.replace(/\//g,'-'); seller = cols[2] || cols[1] || '未知'; amount = parseFloat(cols[cols.length-1])||parseFloat(cols[2])||0; }
    if (/^\d{7}$/.test(date)) { const y = parseInt(date.slice(0,3))+1911; date=`${y}-${date.slice(3,5)}-${date.slice(5,7)}`; }
    return { _id:Date.now()+i, date:date||today(), seller, amount, category:autoCategory(seller), include:true };
  }).filter(r=>r.amount>0);
};

const AmountInput = ({value, onChange, placeholder="0", style, ...props}) => {
  const strVal = String(value||'').replace(/,/g, '');
  const [intPart, decPart] = strVal.split('.');
  const displayVal = (strVal === '' || strVal === '-') ? strVal : (parseInt(intPart||0).toLocaleString('en-US') + (decPart !== undefined ? '.' + decPart : ''));
  const handleChange = e => {
    let raw = e.target.value.replace(/,/g,'');
    if (raw === '' || /^-?\d*\.?\d*$/.test(raw)) onChange({target:{value:raw}});
  };
  return <input type="text" inputMode="decimal" value={strVal==='-'?'-':displayVal} onChange={handleChange} placeholder={placeholder} style={style} {...props} />;
};

const showToast = (msg, type='success') => window.dispatchEvent(new CustomEvent('hj-toast', {detail:{msg,type}}));

function Toast() {
  const [toasts, setToasts] = React.useState([]);
  React.useEffect(()=>{
    const h = e => {
      const {msg, type='success'} = e.detail;
      const id = Date.now() + Math.random();
      setToasts(t=>[...t,{id,msg,type}]);
      setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)), 2800);
    };
    window.addEventListener('hj-toast', h);
    return ()=>window.removeEventListener('hj-toast', h);
  },[]);
  if (!toasts.length) return null;
  const bg = {success:'var(--green)', error:'var(--red)', warning:'var(--gold)'};
  return (
    <div style={{position:'fixed',bottom:28,right:28,zIndex:9999,display:'flex',flexDirection:'column',gap:8,pointerEvents:'none'}}>
      {toasts.map(t=>(
        <div key={t.id} style={{padding:'10px 18px',borderRadius:10,fontSize:13,fontWeight:500,color:'white',background:bg[t.type]||bg.success,boxShadow:'0 4px 20px rgba(0,0,0,0.18)',transition:'opacity 0.3s'}}>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

// ── Charts ────────────────────────────────────────────────────────────────────
function PieChart({data, size=160}) {
  const total = data.reduce((s,d)=>s+d.value,0);
  if (!total) return null;
  let angle = -Math.PI/2;
  const cx=size/2, cy=size/2, r=size/2-10, ri=r*0.55;
  const segs = data.map(d => {
    const sw = (d.value/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
    angle+=sw;
    const x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
    const xi1=cx+ri*Math.cos(angle-sw), yi1=cy+ri*Math.sin(angle-sw);
    const xi2=cx+ri*Math.cos(angle), yi2=cy+ri*Math.sin(angle);
    const lg=sw>Math.PI?1:0;
    return {...d, path:`M ${xi1} ${yi1} L ${x1} ${y1} A ${r} ${r} 0 ${lg} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${ri} ${ri} 0 ${lg} 0 ${xi1} ${yi1} Z`};
  });
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>{segs.map((s,i)=><path key={i} d={s.path} fill={s.color} stroke="white" strokeWidth="2" opacity="0.9"/>)}</svg>;
}

function LineChart({data, height=120}) {
  if (!data||data.length<2) return null;
  const W=400, vals=data.map(d=>d.value), mn=Math.min(...vals), mx=Math.max(...vals), rng=mx-mn||1;
  const pad={l:8,r:8,t:12,b:24}, H=height-pad.t-pad.b;
  const xf=(i)=>pad.l+(i/(data.length-1))*(W-pad.l-pad.r);
  const yf=(v)=>pad.t+H-((v-mn)/rng)*H*0.9-H*0.05;
  const pts=data.map((d,i)=>`${xf(i)},${yf(d.value)}`).join(' ');
  const area=`M ${xf(0)},${yf(data[0].value)} `+data.map((d,i)=>`L ${xf(i)},${yf(d.value)}`).join(' ')+` L ${xf(data.length-1)},${pad.t+H} L ${xf(0)},${pad.t+H} Z`;
  const up=data[data.length-1].value>=data[data.length-2].value;
  const lc=up?'var(--green)':'var(--red)';
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="none" style={{display:'block',overflow:'hidden'}}>
      <defs><linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={lc} stopOpacity="0.15"/><stop offset="100%" stopColor={lc} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill="url(#lg1)"/>
      <polyline points={pts} fill="none" stroke={lc} strokeWidth="2" strokeLinejoin="round" vectorEffect="non-scaling-stroke"/>
      {data.map((d,i)=><text key={i} x={xf(i)} y={pad.t+H+14} textAnchor="middle" fontSize="10" fill="var(--text3)" fontFamily="var(--mono)" style={{vectorEffect:'non-scaling-stroke'}}>{d.label}</text>)}
      <circle cx={xf(data.length-1)} cy={yf(data[data.length-1].value)} r="4" fill={lc} stroke="white" strokeWidth="2" vectorEffect="non-scaling-stroke"/>
    </svg>
  );
}

function CSVModal({onImport, onClose}) {
  const [text, setText] = useState('');
  const [preview, setPreview] = useState([]);
  
  const parse = (raw) => { 
    if(!raw) return [];
    let lines = raw.replace(/\r\n|\r/g, '\n').trim().split('\n').filter(x=>x.trim());
    if(!lines.length) return [];
    if(lines[0].toLowerCase().includes('date') || lines[0].includes('日期') || lines[0].includes('amount')) {
      lines = lines.slice(1);
    }
    return lines.map((l,i)=>{
      const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(x=>x.trim().replace(/^"|"$/g,'').replace(/""/g,'"')); 
      return {
        id: Date.now()+i,
        date: c[0] || today(),
        type: c[1] || 'expense',
        category: c[2] || '其他支出',
        desc: c[3] || '',
        amount: parseFloat((c[4]||'0').toString().replace(/,/g,'')) || 0
      };
    }).filter(r=>r.amount>0); 
  };

  const onChange = (v) => { setText(v); try{setPreview(parse(v));}catch{setPreview([]);} };
  
  const handleFile = (e) => { 
    const f=e.target.files[0]; 
    if(!f) return;
    const read = (encoding) => {
      const r = new FileReader(); 
      r.onload = ev => {
        const res = ev.target.result;
        // 若以 utf-8 讀取出現亂碼替換字元，自動降級以 Big5 解碼 (台灣常見 Excel CSV 格式)
        if(encoding === 'utf-8' && res.includes('\uFFFD')) {
          return read('big5');
        }
        onChange(res);
      }; 
      r.readAsText(f, encoding);
    };
    read('utf-8');
    e.target.value = ''; // allow picking same file again
  };

  return (
    <Modal title="匯入 CSV" onClose={onClose}>
      <p style={{fontSize:12,color:'var(--text2)',marginBottom:8}}>格式：日期,類型(income/expense),分類,說明,金額</p>
      <Field label="上傳檔案"><input type="file" accept=".csv" onChange={handleFile} style={{fontSize:13}}/></Field>
      <Field label="貼上內容"><textarea style={{...inputSt,height:100,resize:'vertical'}} value={text} onChange={e=>onChange(e.target.value)} placeholder="日期,類型,分類,說明,金額"/></Field>
      {preview.length>0&&<p style={{fontSize:12,color:'var(--green)',marginBottom:12}}>✓ 解析出 {preview.length} 筆</p>}
      <div style={{display:'flex',gap:10}}><button style={btnSt(false)} onClick={onClose}>取消</button><button style={{...btnSt(true),flex:1}} onClick={()=>preview.length&&onImport(preview)} disabled={!preview.length}>匯入 {preview.length} 筆</button></div>
    </Modal>
  );
}

function InvoiceModal({onImport, onClose}) {
  const [tab, setTab] = useState('sync');
  const [rows, setRows] = useState([]);
  const [step, setStep] = useState(1);
  const [err, setErr] = useState('');

  const [carrier, setCarrier] = useState(()=>localStorage.getItem('hj_carrier')||'');
  const [pwd, setPwd] = useState(()=>localStorage.getItem('hj_carrier_pwd')||'');
  const [syncing, setSyncing] = useState(false);

  const handleFile = (e) => {
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=ev=>{try{const p=parseInvoiceCSV(ev.target.result); if(!p.length){setErr('無法解析，請確認格式'); return;} setRows(p); setStep(2); setErr('');}catch(ex){setErr('解析失敗');}};
    r.readAsText(f,'UTF-8');
  };

  const doSync = async () => {
    setErr('');
    if(!carrier || !pwd) return setErr('請輸入條碼與驗證碼');
    if(!/^[\/A-Z0-9\+\-\.]{8}$/.test(carrier.toUpperCase())) return setErr('條碼格式錯誤 (需為 / 開頭共 8 碼)');
    
    localStorage.setItem('hj_carrier', carrier.toUpperCase());
    localStorage.setItem('hj_carrier_pwd', pwd);
    setSyncing(true);

    try {
      if (pwd.toLowerCase() === 'demo') {
        await new Promise(r=>setTimeout(r, 1200));
        setRows([
          { _id: 'AA12345678', date: today(), seller: '統一超商股份有限公司', amount: 125, category: '生活花費', include: true },
          { _id: 'AB87654321', date: today(), seller: '全聯實業股份有限公司', amount: 450, category: '生活花費', include: true },
          { _id: 'AC11223344', date: today(), seller: '台灣大車隊', amount: 180, category: '交通', include: true }
        ]);
        setStep(2);
        setSyncing(false);
        return;
      }

      const d = new Date();
      const uuid = Math.random().toString(36).substring(2, 15);
      const m = String(d.getMonth()+1).padStart(2,'0');
      
      const params = new URLSearchParams();
      params.append('version', '0.5');
      params.append('cardType', '3J0002');
      params.append('cardNo', carrier.toUpperCase());
      params.append('expTimeStamp', '2147483647');
      params.append('action', 'carrierInvChk');
      params.append('timeStamp', Math.floor(d.getTime()/1000)+10);
      params.append('startDate', `${d.getFullYear()}/${m}/01`);
      params.append('endDate', `${d.getFullYear()}/${m}/${String(d.getDate()).padStart(2,'0')}`);
      params.append('onlyWinningInv', 'N');
      params.append('uuid', uuid);
      params.append('appID', 'EINV3114993809');
      params.append('cardEncrypt', pwd);

      const targetUrl = 'https://api.einvoice.nat.gov.tw/PB2CAPIVAN/invServ/InvServ';
      let res;
      try {
        res = await fetch(`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`, {
          method: 'POST',
          body: params,
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        });
      } catch (e) {
        throw new Error('請暫時關閉防護軟體，或稍後再試 (CORS 阻隔)');
      }
      
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch(e) { throw new Error('API 回應錯誤 (代理伺服器或財政部異常)'); }
      
      if(data.code !== '200') {
        if(data.code == '998') {
          // Public AppID was blocked or revoked in PROD env -> Fallback to demo
          setErr('財政部拒絕了預設的 API 授權碼 (代碼:998)。已為您轉為展示發票，以便體驗此功能！');
          await new Promise(r=>setTimeout(r, 600));
          setRows([
            { _id: 'AA12345678', date: today(), seller: '統一超商股份有限公司', amount: 125, category: '生活花費', include: true },
            { _id: 'AB87654321', date: today(), seller: '全聯實業股份有限公司', amount: 450, category: '生活花費', include: true },
            { _id: 'AC11223344', date: today(), seller: '台灣大車隊', amount: 180, category: '交通', include: true }
          ]);
          setStep(2);
          setSyncing(false);
          return;
        }
        throw new Error(`${data.msg || 'API 錯誤'} (代碼: ${data.code})`);
      }
      
      const details = data.details || [];
      if(!details.length) throw new Error('這段期間沒有發票記錄');

      const parsed = details.map((inv, i) => {
        let date = today();
        if(inv.invDate) {
          const y = inv.invDate.year + 1911;
          const mm = String(inv.invDate.month).padStart(2,'0');
          const dd = String(inv.invDate.date).padStart(2,'0');
          date = `${y}-${mm}-${dd}`;
        }
        return {
          _id: inv.invNum || Date.now()+i,
          date,
          seller: inv.sellerName || '未知商家',
          amount: parseFloat(inv.amount) || 0,
          category: autoCategory(inv.sellerName || ''),
          include: true
        };
      });

      setRows(parsed);
      setStep(2);
    } catch(e) {
      setErr(`同步失敗：${e.message}`);
    }
    setSyncing(false);
  };

  const toggle = id => setRows(r=>r.map(x=>x._id===id?{...x,include:!x.include}:x));
  const setCat = (id,cat) => setRows(r=>r.map(x=>x._id===id?{...x,category:cat}:x));
  const sel = rows.filter(r=>r.include);
  const doImport = () => onImport(sel.map(r=>({id:Date.now()+r._id,date:r.date,type:'expense',category:r.category,desc:r.seller,amount:r.amount})));

  return (
    <Modal title="匯入電子發票" onClose={onClose}>
      {step===1&&<>
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {['sync','csv'].map(t=>(
            <button key={t} onClick={()=>{setTab(t);setErr('');}} style={{flex:1,padding:'8px',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer',fontSize:13,fontWeight:600,
              background:tab===t?'var(--text)':'var(--surface)',color:tab===t?'white':'var(--text2)'}}>
              {t==='sync'?'☁️ 雲端同步':'📄 CSV 匯入'}
            </button>
          ))}
        </div>

        {tab==='csv'&&<>
          <div style={{background:'var(--accent-light)',borderRadius:10,padding:14,marginBottom:16,fontSize:12,color:'var(--text2)',lineHeight:1.7}}>
            <strong>支援來源</strong><br/>• 財政部平台 → 載具歷史 → 匯出 CSV<br/>• 發票存摺 App → 資料匯出
          </div>
          <Field label="選擇 CSV 檔案"><input type="file" accept=".csv,.txt" onChange={handleFile} style={{fontSize:13}}/></Field>
        </>}

        {tab==='sync'&&<>
          <div style={{background:'var(--gold-bg)',borderRadius:10,padding:'14px',marginBottom:16,fontSize:12,color:'var(--text2)',lineHeight:1.7}}>
            <strong>自動同步本月發票</strong><br/>直接連結財政部 API，免下載檔案。<br/>
            <span style={{color:'var(--text3)'}}>若暫時無法取得密碼，可輸入「demo」測試功能。</span>
          </div>
          <Field label="手機條碼 (含 / )">
            <input style={{...inputSt,fontFamily:'var(--mono)'}} value={carrier} onChange={e=>setCarrier(e.target.value.toUpperCase())} placeholder="/ABC1234"/>
          </Field>
          <Field label="驗證碼 (密碼)">
            <input style={{...inputSt,fontFamily:'var(--mono)'}} type="password" value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="財政部大平台驗證碼"/>
          </Field>
          <button style={{...btnSt(true),width:'100%',marginTop:8,opacity:syncing?0.7:1}} onClick={doSync} disabled={syncing}>
            {syncing?'同步中⋯':'立即同步'}
          </button>
        </>}
        {err&&<p style={{color:'var(--red)',fontSize:13,marginTop:14,textAlign:'center',fontWeight:500}}>{err}</p>}
      </>}

      {step===2&&<>
        {err&&<div style={{background:'var(--red-bg)',color:'var(--red)',padding:'8px 12px',borderRadius:8,fontSize:12,marginBottom:12,fontWeight:500,lineHeight:1.5}}>{err}</div>}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <p style={{fontSize:12,color:'var(--text2)'}}>解析出 <strong>{rows.length}</strong> 筆，勾選 <strong>{sel.length}</strong> 筆後匯入</p>
          <button style={{background:'none',border:'none',color:'var(--accent)',fontSize:12,cursor:'pointer',fontWeight:600}} onClick={()=>setRows(r=>r.map(x=>({...x,include:!sel.length})))}>{sel.length?'全不選':'全選'}</button>
        </div>
        <div style={{maxHeight:300,overflow:'auto',border:'1px solid var(--border)',borderRadius:10}}>
          {rows.map(r=>(
            <div key={r._id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderBottom:'1px solid var(--border)',opacity:r.include?1:0.4}}>
              <input type="checkbox" checked={r.include} onChange={()=>toggle(r._id)} style={{width:16,height:16,accentColor:'var(--accent)'}}/>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontSize:12,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.seller}</p>
                <div style={{display:'flex',gap:6,alignItems:'center',marginTop:2}}>
                  <span style={{fontSize:11,color:'var(--text3)'}}>{r.date}</span>
                  {tab==='sync'&&<span style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',background:'var(--surface2)',padding:'1px 5px',borderRadius:4}}>{r._id}</span>}
                </div>
              </div>
              <select value={r.category} onChange={e=>setCat(r._id,e.target.value)} style={{fontSize:11,padding:'3px 6px',border:'1px solid var(--border)',borderRadius:6,background:'var(--bg)',color:'var(--text)'}}>
                {EXP_CATS.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
              <span style={{fontSize:12,fontFamily:'var(--mono)',fontWeight:600,flexShrink:0}}>{fmt(r.amount)}</span>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:10,marginTop:16}}>
          <button style={btnSt(false)} onClick={()=>setStep(1)}>← {tab==='sync'?'重新同步':'重選'}</button>
          <button style={{...btnSt(true),flex:1}} onClick={doImport} disabled={!sel.length}>匯入 {sel.length} 筆</button>
        </div>
      </>}
    </Modal>
  );
}

// ── AI Bookkeeper ─────────────────────────────────────────────────────────────
function AIBookkeeperModal({onAdd, onAddAsset, onAddLiab, onClose}) {
  const [input, setInput] = useState('');
  const [image, setImage] = useState(null);
  const [messages, setMessages] = useState([
    {role:'assistant', content:'你好！我是你的 AI 記帳助理 🤖\n\n可以幫你記錄：\n・收支：「昨天午餐180」、「薪水入帳75000」\n・資產：「台新銀行存款52萬」、「買比特幣花了18萬」\n・負債：「信用卡帳單2萬8」、「房貸餘額42萬」\n\n📷 也可以上傳帳單照片讓我辨識！'}
  ]);
  const [loading, setLoading] = useState(false);
  const [parsed, setParsed] = useState(null);
  const endRef = React.useRef(null);
  const imgInputRef = React.useRef(null);

  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      const base64 = dataUrl.split(',')[1];
      setImage({ data: base64, mimeType: file.type, preview: dataUrl });
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  };

  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:'smooth'}); },[messages]);

  const MODE_LABEL = { transaction:'收支交易', asset:'資產', liability:'負債' };
  const MODE_COLOR = { transaction:'var(--accent)', asset:'var(--green)', liability:'var(--red)' };

  const send = async () => {
    if ((!input.trim() && !image) || loading) return;
    const userMsg = input.trim() || '請幫我辨識這張帳單並記帳';
    const userImage = image;
    setInput('');
    setImage(null);
    setMessages(m=>[...m,{role:'user', content:userMsg, image:userImage}]);
    setLoading(true);
    setParsed(null);

    const today_str = new Date().toISOString().split('T')[0];
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yesterday_str = yesterday.toISOString().split('T')[0];

    try {
      const res = await callClaude([{role:'user', image:userImage, content:`你是台灣財務記帳助理，能辨識收支交易、資產、負債三種類型，回傳 JSON（不要加其他文字）。

今天：${today_str}，昨天：${yesterday_str}

【收支分類】支出：交通、娛樂、生活花費、房貸、醫療、教育、保險、其他支出
收入：薪資、兼職、投資收益、獎金、租金收入、其他收入
【資產類別】cash（現金/存款）、stock（股票）、fund（基金/定存）、crypto（加密貨幣）
【負債類別】loan（信用貸款）、private_loan（私人借貸）、credit（信用卡）

判斷規則：
- 提到「存款」「帳戶」「餘額」「存了」→ 資產(asset)
- 提到「貸款」「房貸」「信用卡欠款」「負債」→ 負債(liability)
- 提到「買」「花了」「收到」「薪水」→ 收支(transaction)

回傳格式（只回傳一個 JSON）：
{
  "mode": "transaction" 或 "asset" 或 "liability",
  "name": "資產/負債名稱（mode為asset/liability時）",
  "category": "分類代碼",
  "date": "YYYY-MM-DD（僅transaction）",
  "type": "income 或 expense（僅transaction）",
  "desc": "簡短說明（僅transaction，10字內）",
  "amount": 數字,
  "note": "備註（選填）",
  "confidence": "high 或 low",
  "message": "繁體中文確認訊息"
}

用戶輸入：${userMsg}`}]);

      const jsonMatch = res.match(/\{[\s\S]*\}/);
      if (jsonMatch) {
        const data = JSON.parse(jsonMatch[0]);
        setParsed(data);
        setMessages(m=>[...m,{role:'assistant',content:data.message||'已解析，請確認'}]);
      } else {
        setMessages(m=>[...m,{role:'assistant',content:res}]);
      }
    } catch(e) {
      setMessages(m=>[...m,{role:'assistant',content:`❌ 錯誤：${e.message}\n\n請點左側欄 ⚙ API Key 輸入你的 Gemini API Key。`}]);
    }
    setLoading(false);
  };

  const confirm = () => {
    if (!parsed || !parsed.amount) return;
    const mode = parsed.mode || 'transaction';
    if (mode === 'asset') {
      onAddAsset({ id:Date.now(), name:parsed.name||parsed.desc, category:parsed.category||'cash', amount:parsed.amount, note:parsed.note||'', updatedAt:new Date().toISOString().split('T')[0] });
      setMessages(m=>[...m,{role:'assistant',content:`✅ 已新增資產「${parsed.name||parsed.desc}」${fmt(parsed.amount)}！`}]);
    } else if (mode === 'liability') {
      onAddLiab({ id:Date.now(), name:parsed.name||parsed.desc, category:parsed.category||'loan', amount:parsed.amount, note:parsed.note||'', updatedAt:new Date().toISOString().split('T')[0] });
      setMessages(m=>[...m,{role:'assistant',content:`✅ 已新增負債「${parsed.name||parsed.desc}」${fmt(parsed.amount)}！`}]);
    } else {
      onAdd({ id:Date.now(), date:parsed.date, type:parsed.type, category:parsed.category, desc:parsed.desc, amount:parsed.amount });
      setMessages(m=>[...m,{role:'assistant',content:`✅ 已新增「${parsed.desc}」${fmt(parsed.amount)} 到記帳！`}]);
    }
    setParsed(null);
  };

  const modeColor = parsed ? (MODE_COLOR[parsed.mode||'transaction']) : 'var(--accent)';
  const modeLabel = parsed ? (MODE_LABEL[parsed.mode||'transaction']) : '';

  const confirmRows = parsed ? (
    parsed.mode==='asset'||parsed.mode==='liability'
      ? [['名稱',parsed.name||parsed.desc],['類別',parsed.category],['金額',fmt(parsed.amount)],parsed.note?['備註',parsed.note]:null].filter(Boolean)
      : [['日期',parsed.date],['類型',parsed.type==='income'?'收入':'支出'],['分類',parsed.category],['說明',parsed.desc],['金額',fmt(parsed.amount)]]
  ) : [];

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.3)',display:'flex',alignItems:'flex-end',justifyContent:'flex-end',zIndex:1000,padding:24}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'var(--surface)',borderRadius:20,width:400,maxWidth:'92vw',height:560,display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>
        {/* Header */}
        <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:10,background:'var(--text)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🤖</div>
          <div style={{flex:1}}>
            <p style={{fontWeight:600,fontSize:14}}>AI 記帳助理</p>
            <p style={{fontSize:11,color:'var(--text3)'}}>收支、資產、負債都能記</p>
          </div>
          <button onClick={onClose} style={{background:'var(--surface2)',border:'none',borderRadius:8,width:28,height:28,cursor:'pointer',fontSize:16}}>×</button>
        </div>

        {/* Messages */}
        <div style={{flex:1,overflow:'auto',padding:'16px 20px',display:'flex',flexDirection:'column',gap:10}}>
          {messages.map((m,i)=>(
            <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
              <div style={{maxWidth:'85%',display:'flex',flexDirection:'column',gap:4,alignItems:m.role==='user'?'flex-end':'flex-start'}}>
                {m.image&&<img src={m.image.preview} alt="上傳圖片" style={{maxWidth:200,maxHeight:160,borderRadius:10,objectFit:'cover'}}/>}
                <div style={{padding:'10px 14px',borderRadius:m.role==='user'?'16px 16px 4px 16px':'16px 16px 16px 4px',fontSize:13,lineHeight:1.6,whiteSpace:'pre-wrap',
                  background:m.role==='user'?'var(--text)':'var(--surface2)',
                  color:m.role==='user'?'white':'var(--text)'}}>
                  {m.content}
                </div>
              </div>
            </div>
          ))}
          {loading&&(
            <div style={{display:'flex',justifyContent:'flex-start'}}>
              <div style={{padding:'10px 14px',borderRadius:'16px 16px 16px 4px',background:'var(--surface2)',fontSize:13,color:'var(--text3)'}}>AI 分析中⋯</div>
            </div>
          )}
          {parsed&&parsed.amount>0&&(
            <div style={{background:'var(--surface2)',border:`1.5px solid ${modeColor}`,borderRadius:12,padding:'12px 14px'}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10}}>
                <span style={{fontSize:10,fontWeight:700,color:modeColor,background:`color-mix(in srgb,${modeColor} 12%,transparent)`,padding:'2px 8px',borderRadius:5}}>{modeLabel}</span>
                <span style={{fontSize:11,color:'var(--text2)',fontWeight:500}}>確認新增？</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px 8px',marginBottom:12,fontSize:12}}>
                {confirmRows.map(([k,v])=>(
                  <div key={k}><span style={{color:'var(--text3)'}}>{k}：</span><strong>{v}</strong></div>
                ))}
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={confirm} style={{...btnSt(true),flex:1,padding:'8px 12px',fontSize:12}}>✓ 確認新增</button>
                <button onClick={()=>setParsed(null)} style={{...btnSt(false),padding:'8px 12px',fontSize:12}}>取消</button>
              </div>
            </div>
          )}
          <div ref={endRef}/>
        </div>

        {/* Input */}
        <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)',display:'flex',flexDirection:'column',gap:8}}>
          {image&&(
            <div style={{position:'relative',alignSelf:'flex-start'}}>
              <img src={image.preview} alt="預覽" style={{height:64,borderRadius:8,objectFit:'cover'}}/>
              <button onClick={()=>setImage(null)} style={{position:'absolute',top:-6,right:-6,width:18,height:18,borderRadius:'50%',border:'none',background:'var(--red)',color:'white',fontSize:11,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>×</button>
            </div>
          )}
          <div style={{display:'flex',gap:8}}>
            <input type="file" accept="image/*" ref={imgInputRef} onChange={handleImageUpload} style={{display:'none'}}/>
            <button onClick={()=>imgInputRef.current.click()} disabled={loading}
              style={{...btnSt(false),padding:'9px 12px',fontSize:16,flexShrink:0}} title="上傳圖片">📷</button>
            <input value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()}
              placeholder="收支、資產、負債都能說…或直接拍照" disabled={loading}
              style={{...inputSt,flex:1,padding:'9px 12px',fontSize:13}}/>
            <button onClick={send} disabled={loading||(!input.trim()&&!image)} style={{...btnSt(true),padding:'9px 16px',fontSize:13,opacity:loading||(!input.trim()&&!image)?0.5:1}}>送出</button>
          </div>
        </div>
      </div>
    </div>
  );
}
// ── AI Financial Advisor ──────────────────────────────────────────────────────
function AIAdvisorPanel({transactions, assets, liabilities}) {
  const [loading, setLoading] = useState(false);
  const [report, setReport] = useState(null);
  const [question, setQuestion] = useState('');
  const [qLoading, setQLoading] = useState(false);
  const [qAnswer, setQAnswer] = useState('');

  const totalAssets = assets.reduce((s,a)=>s+a.amount,0);
  const totalLiab = liabilities.reduce((s,l)=>s+l.amount,0);
  const netWorth = totalAssets - totalLiab;

  const buildContext = () => {
    const months = getMonths(3);
    const monthly = months.map(m => {
      const txs = transactions.filter(t=>t.date.startsWith(m.key));
      const inc = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
      const exp = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
      return {month:m.label, income:inc, expense:exp, savings:inc-exp};
    });
    return `
【財務數據】
淨資產：NT$${netWorth.toLocaleString()}
總資產：NT$${totalAssets.toLocaleString()}（現金${assets.filter(a=>a.category==='cash').reduce((s,a)=>s+a.amount,0).toLocaleString()} / 股票${assets.filter(a=>a.category==='stock').reduce((s,a)=>s+a.amount,0).toLocaleString()} / 基金定存${assets.filter(a=>a.category==='fund').reduce((s,a)=>s+a.amount,0).toLocaleString()} / 加密${assets.filter(a=>a.category==='crypto').reduce((s,a)=>s+a.amount,0).toLocaleString()}）
總負債：NT$${totalLiab.toLocaleString()}，負債比：${totalAssets>0?((totalLiab/totalAssets)*100).toFixed(1):0}%
近3個月：${monthly.map(m=>`${m.month}收入${m.income.toLocaleString()}/支出${m.expense.toLocaleString()}/結餘${m.savings.toLocaleString()}`).join('；')}
支出分類：${EXP_CATS.map(c=>{const v=transactions.filter(t=>t.type==='expense'&&t.category===c).reduce((s,t)=>s+t.amount,0); return v>0?`${c}${v.toLocaleString()}`:'';}).filter(Boolean).join('、')}
`.trim();
  };

  const analyze = async () => {
    setLoading(true); setReport(null); setQAnswer('');
    try {
      const res = await callClaude([{role:'user', content:`你是台灣個人財務顧問，請根據財務數據提供分析，繁體中文，友善專業。\n\n${buildContext()}\n\n請提供：\n1. **財務健康評分**（0-100分）\n2. **三大優勢**\n3. **三大改善點**\n4. **五個具體行動建議**\n5. **一句話總結**\n\n用Markdown格式。`}]);
      setReport(res);
    } catch(e) { setReport('分析失敗，請稍後再試。'); }
    setLoading(false);
  };

  const ask = async () => {
    if (!question.trim()||qLoading) return;
    setQLoading(true); setQAnswer('');
    try {
      const res = await callClaude([{role:'user', content:`台灣財務顧問。根據數據回答問題，繁體中文，150字內。\n\n${buildContext()}\n\n問題：${question}`}]);
      setQAnswer(res);
    } catch(e) { setQAnswer('查詢失敗'); }
    setQLoading(false);
  };

  const renderMD = (text) => text
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{1,3}\s+(.+)$/gm,'<span style="font-weight:700;font-size:14px;display:block;margin:12px 0 4px">$1</span>')
    .split('\n').map(l=>l.trim()?`<p style="margin:3px 0;line-height:1.75">${l}</p>`:'').join('');

  return (
    <Card>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:10,background:'var(--text)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🤖</div>
          <div><p style={{fontWeight:600,fontSize:14}}>AI 財務顧問</p><p style={{fontSize:11,color:'var(--text3)'}}>基於你的真實財務數據</p></div>
        </div>
        <button onClick={analyze} disabled={loading} style={{...btnSt(true),padding:'8px 18px',fontSize:13,opacity:loading?0.6:1}}>{loading?'分析中…':'🔍 開始分析'}</button>
      </div>

      {!report&&!loading&&(
        <div style={{textAlign:'center',padding:'28px 0',color:'var(--text3)'}}>
          <p style={{fontSize:28,marginBottom:10}}>📊</p>
          <p style={{fontSize:13}}>AI 會讀取你的資產、負債和收支數據<br/>提供個人化財務健康報告與建議</p>
        </div>
      )}
      {loading&&(
        <div style={{textAlign:'center',padding:'28px 0',color:'var(--text3)'}}>
          <p style={{fontSize:13,marginBottom:12}}>AI 正在分析你的財務狀況⋯</p>
          <div style={{height:3,background:'var(--surface2)',borderRadius:2,overflow:'hidden',width:'60%',margin:'0 auto'}}>
            <div style={{height:'100%',background:'var(--accent)',width:'40%',animation:'slide 1.5s ease-in-out infinite'}}/>
          </div>
          <style>{`@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}`}</style>
        </div>
      )}
      {report&&(
        <div>
          <div style={{background:'var(--bg)',borderRadius:12,padding:'16px 20px',fontSize:13,marginBottom:16}} dangerouslySetInnerHTML={{__html:renderMD(report)}}/>
          <div style={{borderTop:'1px solid var(--border)',paddingTop:14}}>
            <p style={{fontSize:12,fontWeight:600,color:'var(--text2)',marginBottom:10}}>繼續提問</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
              {['我的儲蓄率夠嗎？','如何減少支出？','投資組合平衡嗎？','何時可退休？'].map(q=>(
                <button key={q} onClick={()=>setQuestion(q)} style={{padding:'4px 12px',borderRadius:20,border:'1px solid var(--border)',cursor:'pointer',fontSize:11,background:'var(--surface)',color:'var(--text2)'}}>{q}</button>
              ))}
            </div>
            <div style={{display:'flex',gap:8}}>
              <input value={question} onChange={e=>setQuestion(e.target.value)} onKeyDown={e=>e.key==='Enter'&&ask()}
                placeholder="問任何財務問題…" style={{...inputSt,flex:1,fontSize:13}}/>
              <button onClick={ask} disabled={qLoading||!question.trim()} style={{...btnSt(true),padding:'9px 14px',fontSize:13,opacity:qLoading||!question.trim()?0.5:1}}>送出</button>
            </div>
            {qLoading&&<p style={{fontSize:12,color:'var(--text3)',marginTop:8}}>思考中⋯</p>}
            {qAnswer&&<div style={{marginTop:12,background:'var(--accent-light)',borderRadius:10,padding:'12px 16px',fontSize:13,lineHeight:1.7}}>{qAnswer}</div>}
          </div>
        </div>
      )}
    </Card>
  );
}

function AnalysisTab({transactions,
  txSearch, onTxSearchChange, isHighOnly, onHighOnlyToggle,
  onAddTx, onEditTx, onDelTx, onAddPayment,
  onImportInvoice, onImportCSV, exportCSV,
  showInvBanner, lastInvoice, carrierCode, onSetCarrier, onDismissInvBanner}) {

  const months = getMonths(6);
  const [selMonth, setSelMonth] = useState(months[months.length-1].key);

  const monthTxs = transactions.filter(t=>t.type==='expense'&&t.date.startsWith(selMonth));
  const monthTotal = monthTxs.reduce((s,t)=>s+t.amount,0);
  const daysInMonth = new Date(selMonth.slice(0,4), parseInt(selMonth.slice(5,7)), 0).getDate();
  const avgDaily = monthTotal/daysInMonth;

  const prevIdx = months.findIndex(m=>m.key===selMonth)-1;
  const prevKey = prevIdx>=0?months[prevIdx].key:null;
  const prevTotal = prevKey?transactions.filter(t=>t.type==='expense'&&t.date.startsWith(prevKey)).reduce((s,t)=>s+t.amount,0):0;
  const diff = monthTotal - prevTotal;

  const byCat = EXP_CATS.map((c,i)=>({label:c,color:CAT_COLORS[i%CAT_COLORS.length],value:monthTxs.filter(t=>t.category===c).reduce((s,t)=>s+t.amount,0)})).filter(d=>d.value>0).sort((a,b)=>b.value-a.value);

  const monthlyTotals = months.map(m=>({
    label:m.label, key:m.key,
    expense:transactions.filter(t=>t.type==='expense'&&t.date.startsWith(m.key)).reduce((s,t)=>s+t.amount,0),
  }));

  const byDesc = {};
  monthTxs.forEach(t=>{byDesc[t.desc]=(byDesc[t.desc]||0)+t.amount;});
  const topMerchants = Object.entries(byDesc).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const listTxs = monthTxs
    .filter(t=>!isHighOnly||t.amount>=1000)
    .filter(t=>!txSearch||t.desc.includes(txSearch)||t.category.includes(txSearch))
    .sort((a,b)=>b.date.localeCompare(a.date));

  const HBar = ({label,value,total,color}) => (
    <div style={{marginBottom:8}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
        <span style={{fontSize:11,color:'var(--text2)'}}>{label}</span>
        <div style={{display:'flex',gap:8}}>
          <span style={{fontSize:11,color:'var(--text3)'}}>{total>0?((value/total)*100).toFixed(0):0}%</span>
          <span style={{fontSize:11,fontFamily:'var(--mono)',fontWeight:600}}>{fmt(value)}</span>
        </div>
      </div>
      <div style={{height:5,background:'var(--surface2)',borderRadius:3,overflow:'hidden'}}>
        <div style={{width:`${total>0?Math.min((value/total)*100,100):0}%`,height:'100%',background:color,borderRadius:3,transition:'width 0.4s'}}/>
      </div>
    </div>
  );

  const W=380, BH=80, bw=18, step=W/monthlyTotals.length;
  const maxE=Math.max(...monthlyTotals.map(m=>m.expense),1);

  return (
    <div style={{display:'flex',flexDirection:'column',gap:14}}>

      {/* Invoice Banner */}
      {showInvBanner&&(
        <div style={{background:'var(--gold-bg)',border:'1px solid var(--gold)',borderRadius:12,padding:'12px 18px',display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:18}}>🧾</span>
          <div style={{flex:1}}>
            <span style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>今天還沒匯入電子發票</span>
            <span style={{fontSize:12,color:'var(--text2)',marginLeft:10}}>上次匯入：{lastInvoice||'從未'}</span>
          </div>
          {carrierCode&&(
            <a href="https://www.einvoice.nat.gov.tw/APCONSUMER/BTC501W/" target="_blank" rel="noreferrer"
              style={{padding:'7px 14px',borderRadius:8,background:'var(--gold)',color:'white',fontSize:12,fontWeight:600,textDecoration:'none',flexShrink:0}}>
              前往下載 →
            </a>
          )}
          <button onClick={onSetCarrier} style={{padding:'7px 12px',borderRadius:8,border:'1px solid var(--gold)',background:'transparent',fontSize:12,cursor:'pointer',color:'var(--text)',flexShrink:0}}>
            {carrierCode?`載具：${carrierCode}`:'設定載具'}
          </button>
          <button onClick={onDismissInvBanner} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:'var(--text3)',padding:4,flexShrink:0}}>×</button>
        </div>
      )}

      {/* Month selector + action buttons */}
      <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
        <span style={{fontSize:13,fontWeight:600,color:'var(--text2)',marginRight:2}}>月份</span>
        {months.map(m=>(
          <button key={m.key} onClick={()=>setSelMonth(m.key)} style={{padding:'5px 14px',borderRadius:8,border:'2px solid',cursor:'pointer',fontSize:12,fontWeight:500,
            borderColor:selMonth===m.key?'var(--text)':'var(--border)',
            background:selMonth===m.key?'var(--text)':'var(--surface)',
            color:selMonth===m.key?'white':'var(--text2)'}}>
            {m.label}
          </button>
        ))}
        <div style={{flex:1}}/>
        <button onClick={onImportInvoice} style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer',fontSize:12,background:'var(--surface)'}}>🧾 發票</button>
        <button onClick={onImportCSV} style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer',fontSize:12,background:'var(--surface)'}}>↑ 匯入</button>
        <button onClick={exportCSV} style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer',fontSize:12,background:'var(--surface)'}}>↓ 匯出</button>
        <button onClick={onAddTx} style={{padding:'6px 14px',borderRadius:8,border:'none',cursor:'pointer',fontSize:12,background:'var(--text)',color:'white',fontWeight:500}}>+ 新增</button>
      </div>

      {/* KPIs */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
        <Card>
          <p style={{fontSize:11,color:'var(--text3)',marginBottom:5}}>本月總支出</p>
          <div style={{fontSize:22,fontWeight:700,fontFamily:'var(--mono)',color:'var(--red)'}}>{fmt(monthTotal)}</div>
          {prevTotal>0&&<div style={{marginTop:4,fontSize:11,color:diff<=0?'var(--green)':'var(--red)'}}>{diff<=0?'▼':'▲'} {fmt(Math.abs(diff))} 較上月</div>}
        </Card>
        <Card>
          <p style={{fontSize:11,color:'var(--text3)',marginBottom:5}}>日均支出</p>
          <div style={{fontSize:22,fontWeight:700,fontFamily:'var(--mono)'}}>{fmt(Math.round(avgDaily))}</div>
          <div style={{marginTop:4,fontSize:11,color:'var(--text3)'}}>/ 天（{daysInMonth}天）</div>
        </Card>
        <Card>
          <p style={{fontSize:11,color:'var(--text3)',marginBottom:5}}>支出筆數</p>
          <div style={{fontSize:22,fontWeight:700,fontFamily:'var(--mono)'}}>{monthTxs.length} 筆</div>
          <div style={{marginTop:4,fontSize:11,color:'var(--text3)'}}>均 {monthTxs.length?fmt(Math.round(monthTotal/monthTxs.length)):fmt(0)} / 筆</div>
        </Card>
      </div>

      {/* Charts row */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:12,alignItems:'start'}}>
        {/* Category breakdown */}
        <Card>
          <p style={{fontSize:13,fontWeight:600,marginBottom:12}}>支出分類</p>
          {byCat.length===0
            ?<p style={{color:'var(--text3)',fontSize:13,textAlign:'center',padding:'20px 0'}}>本月無支出記錄</p>
            :<>
              <div style={{display:'flex',justifyContent:'center',marginBottom:12}}><PieChart data={byCat} size={110}/></div>
              {byCat.map(d=><HBar key={d.label} label={d.label} value={d.value} total={monthTotal} color={d.color}/>)}
            </>
          }
        </Card>
        {/* Trend + top5 */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Card>
            <p style={{fontSize:13,fontWeight:600,marginBottom:4}}>6個月支出趨勢</p>
            <p style={{fontSize:11,color:'var(--text3)',marginBottom:8}}>點選月份切換分析</p>
            <svg width="100%" height={BH+20} viewBox={`0 0 ${W} ${BH+20}`} preserveAspectRatio="none">
              {monthlyTotals.map((m,i)=>{
                const cx=i*step+step/2, eh=(m.expense/maxE)*BH*0.85;
                const active=m.key===selMonth;
                return <g key={i} style={{cursor:'pointer'}} onClick={()=>setSelMonth(m.key)}>
                  <rect x={cx-bw} y={BH-eh} width={bw*2} height={eh} fill="var(--red)" opacity={active?0.9:0.35} rx="3"/>
                  <text x={cx} y={BH+14} textAnchor="middle" fontSize="10" fill={active?'var(--text)':'var(--text3)'} fontWeight={active?'600':'400'}>{m.label}</text>
                  {active&&eh>0&&<text x={cx} y={BH-eh-4} textAnchor="middle" fontSize="9" fill="var(--red)">{fmt(m.expense)}</text>}
                </g>;
              })}
            </svg>
          </Card>
          <Card>
            <p style={{fontSize:13,fontWeight:600,marginBottom:12}}>前5大支出</p>
            {topMerchants.length===0
              ?<p style={{color:'var(--text3)',fontSize:12}}>無資料</p>
              :topMerchants.map(([name,val],i)=>(
                <div key={name} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                  <div style={{width:20,height:20,borderRadius:5,background:'var(--surface2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'var(--text2)',flexShrink:0}}>{i+1}</div>
                  <span style={{flex:1,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</span>
                  <span style={{fontSize:12,fontFamily:'var(--mono)',fontWeight:600}}>{fmt(val)}</span>
                </div>
              ))
            }
          </Card>
        </div>
      </div>

      {/* Transaction list */}
      <Card style={{padding:0,overflow:'hidden'}}>
        <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <input value={txSearch} onChange={onTxSearchChange} placeholder="搜尋說明或分類…" style={{...inputSt,flex:1,minWidth:120}}/>
          <button onClick={onHighOnlyToggle} style={{padding:'6px 12px',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer',fontSize:12,fontWeight:500,
            background:isHighOnly?'var(--text)':'var(--surface)',color:isHighOnly?'white':'var(--text2)'}}>
            1,000↑
          </button>
          <span style={{fontSize:11,color:'var(--text3)'}}>{listTxs.length} 筆</span>
        </div>
        <div style={{maxHeight:420,overflowY:'auto'}}>
          {listTxs.length===0
            ?<div style={{padding:40,textAlign:'center',color:'var(--text3)',fontSize:13}}>尚無符合記錄</div>
            :listTxs.map((t,i)=>(
              <div key={t.id} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 16px',borderBottom:i<listTxs.length-1?'1px solid var(--border)':'none'}}>
                <div style={{width:32,height:32,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,background:'var(--red-bg)',flexShrink:0}}>💸</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontWeight:500,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.desc}</span>
                    <Tag color='var(--red)' bg='var(--red-bg)'>{t.category}</Tag>
                  </div>
                  <p style={{fontSize:10,color:'var(--text3)',marginTop:1}}>{t.date}</p>
                </div>
                <span style={{fontFamily:'var(--mono)',fontWeight:600,fontSize:13,flexShrink:0}}>-{fmt(t.amount)}</span>
                <div style={{display:'flex',gap:1,flexShrink:0}}>
                  <button title="新增到現金記帳" onClick={()=>onAddPayment({date:t.date,name:t.desc,amount:String(t.amount),category:'credit_card',note:t.category})} style={{background:'none',border:'none',cursor:'pointer',fontSize:14,color:'var(--text3)',padding:3}}>＋</button>
                  <button onClick={()=>onEditTx(t)} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--text3)',padding:3}}>✏️</button>
                  <button onClick={()=>onDelTx(t.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--text3)',padding:3}}>🗑</button>
                </div>
              </div>
            ))
          }
        </div>
      </Card>
    </div>
  );
}

// ── Realized PnL Modal ───────────────────────────────────────────────────────
function RealizedPnlModal({item, defaultFxRate, onSave, onClose}) {
  const initF = item ? {...item, sellPrice:String(item.sellPrice), costPrice:String(item.costPrice), quantity:String(item.quantity), fxRate:String(item.fxRate||defaultFxRate)} :
    {date:today(), name:'', ticker:'', category:'tw_stock', quantity:'', sellPrice:'', costPrice:'', fxRate:String(defaultFxRate), note:''};
  const [f, setF] = useState(initF);
  const set = k => e => setF(p=>({...p,[k]:e.target.value}));
  const isUs = f.category === 'us_stock';
  const fx = parseFloat(f.fxRate)||defaultFxRate;
  const qty = parseFloat(f.quantity)||0;
  const sell = parseFloat(f.sellPrice)||0;
  const cost = parseFloat(f.costPrice)||0;
  const pnlRaw = (sell - cost) * qty * (isUs ? fx : 1);
  const totalCostTwd = cost * qty * (isUs ? fx : 1);
  const roi = totalCostTwd > 0 ? (pnlRaw / totalCostTwd * 100) : 0;
  const valid = f.name && qty > 0 && sell > 0 && cost > 0 && f.date;

  const catOptions = [['tw_stock','🇹🇼 台股'],['us_stock','🇺🇸 美股'],['etf','🏛 ETF'],['crypto','₿ 加密貨幣'],['fund','💼 基金']];

  const handleSave = () => {
    onSave({...f, quantity:qty, sellPrice:sell, costPrice:cost,
      fxRate: isUs ? fx : null,
      pnl: parseFloat(pnlRaw.toFixed(0)),
      id: f.id || Date.now()});
  };

  return (
    <Modal title={item ? '編輯損益紀錄' : '新增已實損益'} onClose={onClose}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}}>
        <Field label="賣出日期"><input type="date" style={inputSt} value={f.date} onChange={set('date')}/></Field>
        <Field label="類別"><select style={inputSt} value={f.category} onChange={set('category')}>{catOptions.map(([k,l])=><option key={k} value={k}>{l}</option>)}</select></Field>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}}>
        <Field label="股票名稱"><input style={inputSt} value={f.name} onChange={set('name')} placeholder={isUs?'NVIDIA':'台積電'}/></Field>
        <Field label="代號（選填）"><input style={inputSt} value={f.ticker} onChange={set('ticker')} placeholder={isUs?'NVDA':'2330'}/></Field>
      </div>
      {isUs && (
        <Field label="匯率 (1 USD = ? TWD)">
          <AmountInput style={inputSt} value={f.fxRate} onChange={set('fxRate')} placeholder={String(defaultFxRate)}/>
        </Field>
      )}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'0 12px'}}>
        <Field label="賣出張數/股數"><AmountInput style={inputSt} value={f.quantity} onChange={set('quantity')} placeholder="0"/></Field>

          <div><p style={{color:'var(--text3)',marginBottom:3}}>已實損益</p><strong style={{color:pnlRaw>=0?'var(--red)':'var(--green)'}}>{pnlRaw>=0?'+':''}{fmt(pnlRaw)} ({roi.toFixed(1)}%)</strong></div>
        </div>
      )}

// ── Realized PnL Tab ─────────────────────────────────────────────────────────
function RealizedPnlTab({records, onAdd, onEdit, onDelete}) {
  const [filterYear, setFilterYear]   = useState('all');
  const [filterCat,  setFilterCat]    = useState('all');
  const [sortKey,    setSortKey]      = useState('date');

  const years = [...new Set(records.map(r => r.date?.slice(0,4)))].filter(Boolean).sort().reverse();

  const filtered = records
    .filter(r => filterYear === 'all' || r.date?.startsWith(filterYear))
    .filter(r => filterCat  === 'all' || r.category === filterCat)
    .sort((a,b) => sortKey === 'date' ? b.date?.localeCompare(a.date) : b.pnl - a.pnl);

  const totalPnl   = filtered.reduce((s,r) => s + (r.pnl||0), 0);
  const winCount   = filtered.filter(r => r.pnl > 0).length;
  const loseCount  = filtered.filter(r => r.pnl < 0).length;
  const winRate    = filtered.length > 0 ? (winCount / filtered.length * 100).toFixed(0) : 0;

  const thisYear  = new Date().getFullYear();
  const thisMonth = `${thisYear}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
  const pnlThisYear  = records.filter(r => r.date?.startsWith(String(thisYear))).reduce((s,r) => s + (r.pnl||0), 0);
  const pnlThisMonth = records.filter(r => r.date?.startsWith(thisMonth)).reduce((s,r) => s + (r.pnl||0), 0);

        </div>

            <div style={{fontSize:22, fontWeight:700, fontFamily:'var(--mono)', color:pnlColor(value), letterSpacing:'-0.5px'}}>{pnlSign(value)}{fmt(value)}</div>
            <p style={{fontSize:11, color:'var(--text3)', marginTop:4}}>{sub}</p>

      <div style={{display:'flex', gap:8, marginBottom:16, flexWrap:'wrap'}}>

function InvestmentModal({item, fxRate, onSave, onClose}) {
  const isUs = cat => cat === 'us_stock';
  // For us_stock: usdCostPrice may be set explicitly, or costPrice itself is in USD (legacy)
  const initF = item
    ? {...item,
        // canonical USD value: explicit field, or fall back to costPrice which was already USD
        usdCostPrice:    isUs(item.category) ? String(item.usdCostPrice    != null ? item.usdCostPrice    : item.costPrice)    : '',
        usdCurrentPrice: isUs(item.category) ? String(item.usdCurrentPrice != null ? item.usdCurrentPrice : item.currentPrice) : '',
        // costPrice/currentPrice input shows USD for us_stock
        costPrice:    isUs(item.category) ? String(item.usdCostPrice    != null ? item.usdCostPrice    : item.costPrice)    : String(item.costPrice),
        currentPrice: isUs(item.category) ? String(item.usdCurrentPrice != null ? item.usdCurrentPrice : item.currentPrice) : String(item.currentPrice),
      }
    : {name:'',ticker:'',category:'tw_stock',quantity:'',costPrice:'',currentPrice:'',usdCostPrice:'',usdCurrentPrice:'',note:''};
  const [f, setF] = useState(initF);
  const set = k => e => setF(p=>({...p,[k]:e.target.value}));

  const usd = isUs(f.category);
  // prices used for preview computation (always TWD)
  const twdCost = usd ? parseFloat(f.costPrice||0)*fxRate : parseFloat(f.costPrice||0);
  const twdCurr = usd ? parseFloat(f.currentPrice||0)*fxRate : parseFloat(f.currentPrice||0);
  const qty = parseFloat(f.quantity||0);
  const mv   = qty * twdCurr;
  const cost = qty * twdCost;
  const pnl  = mv - cost;
  const valid = f.name && qty>0 && parseFloat(f.costPrice)>0 && parseFloat(f.currentPrice)>0;

  const handleSave = () => {
    const base = {...f, quantity:parseFloat(f.quantity)};
    if(usd) {
      const usdCost = parseFloat(f.costPrice);
      const usdCurr = parseFloat(f.currentPrice);
      onSave({...base, usdCostPrice:usdCost, usdCurrentPrice:usdCurr,
              costPrice:parseFloat((usdCost*fxRate).toFixed(0)),
              currentPrice:parseFloat((usdCurr*fxRate).toFixed(0))});
    } else {
      onSave({...base, costPrice:parseFloat(f.costPrice), currentPrice:parseFloat(f.currentPrice),
              usdCostPrice:null, usdCurrentPrice:null});
    }
  };

  return (
    <Modal title={item?'編輯持倉':'新增持倉'} onClose={onClose}>

        <Field label="名稱"><input style={inputSt} value={f.name} onChange={set('name')} placeholder={usd?'NVIDIA':'台積電'}/></Field>
        <Field label="代號（選填）"><input style={inputSt} value={f.ticker} onChange={set('ticker')} placeholder={usd?'NVDA':'2330'}/></Field>
      </div>
      <Field label="類別"><select style={inputSt} value={f.category} onChange={e=>{setF(p=>({...p,category:e.target.value,costPrice:'',currentPrice:'',usdCostPrice:'',usdCurrentPrice:''}));}}>{[['tw_stock','🇹🇼 台股'],['us_stock','🇺🇸 美股'],['etf','🏛 ETF/基金'],['crypto','₿ 加密貨幣'],['fund','💼 共同基金']].map(([k,l])=><option key={k} value={k}>{l}</option>)}</select></Field>

      {usd&&(
        <div style={{background:'oklch(95% 0.04 240)',border:'1px solid oklch(85% 0.06 240)',borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:12,color:'oklch(35% 0.1 240)'}}>
          🇺🇸 美股模式：輸入美金（USD），系統以 <strong>1 USD = {fxRate} TWD</strong> 自動換算台幣
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'0 12px'}}>
        <Field label="持有股數">
          <AmountInput style={inputSt} value={f.quantity} onChange={set('quantity')} placeholder="0"/>
        </Field>
        <Field label={usd?'買入均價 (USD $)':'買入均價 (TWD)'}>
          <div style={{position:'relative'}}>
            {usd&&<span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--text2)',fontWeight:600}}>$</span>}
            <AmountInput style={{...inputSt, paddingLeft:usd?24:12}} value={f.costPrice} onChange={set('costPrice')} placeholder="0"/>
          </div>
          {usd&&parseFloat(f.costPrice)>0&&<p style={{fontSize:10,color:'var(--text3)',marginTop:3}}>≈ {fmt(parseFloat(f.costPrice)*fxRate)} TWD</p>}
        </Field>

          </div>
          {usd&&parseFloat(f.currentPrice)>0&&<p style={{fontSize:10,color:'var(--text3)',marginTop:3}}>≈ {fmt(parseFloat(f.currentPrice)*fxRate)} TWD</p>}

    </Modal>
  );
}

// ── Weekly Snapshots ──────────────────────────────────────────────────────────
function buildWeeklySnapshots(assets, liabilities, history, numWeeks=12) {
  const toLocalDateStr = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const today = new Date();
  const daysFromSunday = today.getDay(); // 0=Sun, 1=Mon, ...
  const latestSunday = new Date(today);
  latestSunday.setDate(today.getDate() - daysFromSunday);
  const weeks = Array.from({length:numWeeks}, (_,i)=>{
    const d = new Date(latestSunday);
    d.setDate(latestSunday.getDate() - (numWeeks-1-i)*7);
    return toLocalDateStr(d);
  });
  return weeks.map(wDate=>{
    const assetVal = (a, isLiab) => {
      const recs = history.filter(h=>h.assetId===a.id&&h.isLiab===isLiab&&h.date<=wDate).sort((x,y)=>y.date.localeCompare(x.date));
      if (recs.length) return recs[0].amount;
      return (a.updatedAt||'9999') <= wDate ? a.amount : 0;
    };
    const aVals = assets.map(a=>({...a, val:assetVal(a,false)}));
    const lVals = liabilities.map(l=>({...l, val:assetVal(l,true)}));
    const totalAssets = aVals.reduce((s,a)=>s+a.val,0);
    const totalLiab   = lVals.reduce((s,l)=>s+l.val,0);
    const d = new Date(wDate); const mm=d.getMonth()+1, dd=d.getDate();
    return {
      date: wDate,
      label: `${mm}/${dd}`,
      totalAssets, totalLiab,
      netWorth: totalAssets-totalLiab,
      cash:         aVals.filter(a=>a.category==='cash').reduce((s,a)=>s+a.val,0),
      stock:        aVals.filter(a=>a.category==='stock').reduce((s,a)=>s+a.val,0),
      fund:         aVals.filter(a=>a.category==='fund').reduce((s,a)=>s+a.val,0),
      crypto:       aVals.filter(a=>a.category==='crypto').reduce((s,a)=>s+a.val,0),
      loan:         lVals.filter(l=>l.category==='loan').reduce((s,l)=>s+l.val,0),
      private_loan: lVals.filter(l=>l.category==='private_loan').reduce((s,l)=>s+l.val,0),
      credit:       lVals.filter(l=>l.category==='credit').reduce((s,l)=>s+l.val,0),
    };
  });
}

function NetWorthChart({series, snaps, height=150}) {
  const W=560, barAreaH=36, lineH=height-barAreaH-4;
  const pad={l:8,r:8,t:10,b:0};
  const H=lineH-pad.t-pad.b;
  const allVals=series.flatMap(s=>s.data.map(d=>d.value));
  const mn=Math.min(...allVals), mx=Math.max(...allVals), rng=mx-mn||1;
  const n=series[0]?.data.length||0;
  const xf=i=>pad.l+(i/(n-1||1))*(W-pad.l-pad.r);
  const yf=v=>pad.t+H-((v-mn)/rng)*H*0.88-H*0.06;
  const changes=snaps.map((w,i)=>i===0?0:w.netWorth-snaps[i-1].netWorth);
  const maxAbs=Math.max(...changes.map(c=>Math.abs(c)),1);
  const barMaxH=barAreaH-10;
  const barW=(W-pad.l-pad.r)/n*0.55;
  const midY=lineH+4+barAreaH/2;
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="none" style={{display:'block',overflow:'visible'}}>
      {series.map(s=>{
        const pts=s.data.map((d,i)=>`${xf(i)},${yf(d.value)}`).join(' ');
        return <polyline key={s.label} points={pts} fill="none" stroke={s.color} strokeWidth="2" strokeLinejoin="round" vectorEffect="non-scaling-stroke"/>;
      })}
      {series.map(s=>{
        const last=s.data[s.data.length-1]; if(!last) return null;
        return <circle key={s.label} cx={xf(n-1)} cy={yf(last.value)} r="3.5" fill={s.color} stroke="white" strokeWidth="1.5" vectorEffect="non-scaling-stroke"/>;
      })}
      <line x1={pad.l} y1={lineH+2} x2={W-pad.r} y2={lineH+2} stroke="var(--border)" strokeWidth="0.5" vectorEffect="non-scaling-stroke"/>
      <line x1={pad.l} y1={midY} x2={W-pad.r} y2={midY} stroke="var(--border)" strokeWidth="0.5" strokeDasharray="3,3" vectorEffect="non-scaling-stroke"/>
      {changes.map((c,i)=>{
        if(i===0) return null;
        const bh=Math.max((Math.abs(c)/maxAbs)*(barMaxH/2),1);
        return <rect key={i} x={xf(i)-barW/2} y={c>=0?midY-bh:midY} width={barW} height={bh}
          fill={c>=0?'var(--green)':'var(--red)'} opacity="0.75" rx="1" vectorEffect="non-scaling-stroke"/>;
      })}
      {series[0]?.data.map((d,i)=>(
        <text key={i} x={xf(i)} y={height-2} textAnchor="middle" fontSize="9" fill="var(--text3)" fontFamily="var(--mono)" style={{vectorEffect:'non-scaling-stroke'}}>{d.label}</text>
      ))}
    </svg>
  );
}

function MultiLineChart({series, height=160, showLegend=true}) {
  const [hov, setHov] = React.useState(null);
  const W=560, pad={l:8,r:8,t:10,b:22};
  const H=height-pad.t-pad.b;
  const allVals = series.flatMap(s=>s.data.map(d=>d.value));
  const mn=Math.min(...allVals), mx=Math.max(...allVals), rng=mx-mn||1;
  const n = series[0]?.data.length||0;
  const xf = i=>pad.l+(i/(n-1||1))*(W-pad.l-pad.r);
  const yf = v=>pad.t+H-((v-mn)/rng)*H*0.88-H*0.06;
  const handleMove = e => {
    const rect = e.currentTarget.getBoundingClientRect();
    const px = (e.clientX - rect.left) / rect.width * W;
    const idx = Math.round((px - pad.l) / (W - pad.l - pad.r) * (n - 1));
    setHov(Math.max(0, Math.min(n-1, idx)));
  };
  const tipLeft = hov !== null ? Math.min(Math.max(xf(hov)/W*100, 5), 70) : 0;
  return (
    <div style={{position:'relative'}}>
      <svg width="100%" height={height} viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="none"
        style={{display:'block',overflow:'visible',cursor:'crosshair'}}
        onMouseMove={handleMove} onMouseLeave={()=>setHov(null)}>
        {series.map(s=>{
          const pts=s.data.map((d,i)=>`${xf(i)},${yf(d.value)}`).join(' ');
          return <polyline key={s.label} points={pts} fill="none" stroke={s.color} strokeWidth="2" strokeLinejoin="round" vectorEffect="non-scaling-stroke"/>;
        })}
        {series[0]?.data.map((d,i)=>(
          <text key={i} x={xf(i)} y={pad.t+H+15} textAnchor="middle" fontSize="9" fill="var(--text3)" fontFamily="var(--mono)" style={{vectorEffect:'non-scaling-stroke'}}>{d.label}</text>
        ))}
        {series.map(s=>{
          const last=s.data[s.data.length-1]; if(!last) return null;
          return <circle key={s.label} cx={xf(n-1)} cy={yf(last.value)} r="3.5" fill={s.color} stroke="white" strokeWidth="1.5" vectorEffect="non-scaling-stroke"/>;
        })}
        {hov!==null&&<>
          <line x1={xf(hov)} y1={pad.t} x2={xf(hov)} y2={pad.t+H} stroke="var(--text3)" strokeWidth="1" strokeDasharray="3,3" vectorEffect="non-scaling-stroke"/>
          {series.map(s=>s.data[hov]&&<circle key={s.label} cx={xf(hov)} cy={yf(s.data[hov].value)} r="4" fill={s.color} stroke="white" strokeWidth="1.5" vectorEffect="non-scaling-stroke"/>)}
        </>}
      </svg>
      {hov!==null&&series[0]?.data[hov]&&(
        <div style={{position:'absolute',top:4,left:`${tipLeft}%`,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 10px',fontSize:11,boxShadow:'0 4px 16px rgba(0,0,0,0.12)',pointerEvents:'none',whiteSpace:'nowrap',zIndex:10}}>
          <div style={{fontWeight:600,color:'var(--text2)',marginBottom:4}}>{series[0].data[hov].label}</div>
          {series.map(s=>s.data[hov]&&(
            <div key={s.label} style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
              <span style={{width:8,height:8,borderRadius:'50%',background:s.color,flexShrink:0,display:'inline-block'}}/>
              <span style={{color:'var(--text3)'}}>{s.label}：</span>
              <span style={{fontFamily:'var(--mono)',fontWeight:600}}>{fmt(s.data[hov].value)}</span>
            </div>
          ))}
        </div>
      )}
      {showLegend&&<div style={{display:'flex',gap:14,flexWrap:'wrap',marginTop:4}}>
        {series.map(s=><span key={s.label} style={{fontSize:11,display:'flex',alignItems:'center',gap:4}}><span style={{width:14,height:3,borderRadius:2,background:s.color,display:'inline-block'}}/>{s.label}</span>)}
      </div>}
    </div>
  );
}

function HistorySnapshotModal({assets, liabilities, history, editDate, onSave, onClose}) {
  const [date, setDate] = useState(editDate || '');
  const [vals, setVals] = useState(()=>{
    const m = {};
    if (editDate && history) {
      const assetVal = (a, isLiab) => {
        const recs = history.filter(h=>h.assetId===a.id&&h.isLiab===isLiab&&h.date<=editDate).sort((x,y)=>y.date.localeCompare(x.date));
        if (recs.length) return recs[0].amount;
        return (a.updatedAt||'9999') <= editDate ? a.amount : '';
      };
      assets.forEach(a=>{ m[`a_${a.id}`] = assetVal(a, false); });
      liabilities.forEach(l=>{ m[`l_${l.id}`] = assetVal(l, true); });
    } else {
      [...assets.map(a=>({...a,isLiab:false})), ...liabilities.map(l=>({...l,isLiab:true}))].forEach(x=>{ m[`${x.isLiab?'l':'a'}_${x.id}`] = ''; });
    }
    return m;
  });
  const setVal = k => e => setVals(p=>({...p,[k]:e.target.value}));
  const filled = Object.values(vals).filter(v=>v!=='').length;
  const fillCurrent = () => {
    const m = {};
    assets.forEach(a=>{ m[`a_${a.id}`] = a.amount; });
    liabilities.forEach(l=>{ m[`l_${l.id}`] = l.amount; });
    setVals(m);
  };

  const handleSave = () => {
    const entries = [];
    assets.forEach((a,i)=>{
      const v = parseFloat(vals[`a_${a.id}`]);
      if (!isNaN(v)) entries.push({id:Date.now()+i, assetId:a.id, isLiab:false, name:a.name, amount:v, date});
    });
    liabilities.forEach((l,i)=>{
      const v = parseFloat(vals[`l_${l.id}`]);
      if (!isNaN(v)) entries.push({id:Date.now()+10000+i, assetId:l.id, isLiab:true, name:l.name, amount:v, date});
    });
    onSave(entries, date);
  };

  const sections = [
    {title:'資產', items:assets.map(a=>({...a,isLiab:false})), cats:CAT_META},
    {title:'負債', items:liabilities.map(l=>({...l,isLiab:true})), cats:CAT_META},
  ];

  return (
    <Modal title="新增歷史快照" onClose={onClose}>
      <p style={{fontSize:12,color:'var(--text2)',marginBottom:14}}>選擇一個過去的日期，填入當時各項目的金額（可只填部分項目）</p>
      <Field label="快照日期">
        <input type="date" style={inputSt} value={date} onChange={e=>setDate(e.target.value)} max={new Date().toISOString().split('T')[0]}/>
      </Field>
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:4}}>
        <button onClick={fillCurrent} style={{padding:'5px 12px',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer',fontSize:12,background:'var(--surface)'}}>↙ 填入全部現值</button>
      </div>
      {sections.map(sec=>(
        <div key={sec.title} style={{marginBottom:16}}>
          <p style={{fontSize:12,fontWeight:700,color:'var(--text2)',marginBottom:10}}>{sec.title}</p>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {sec.items.map(item=>{
              const k = `${item.isLiab?'l':'a'}_${item.id}`;
              const meta = sec.cats[item.category];
              return (
                <div key={k} style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:13,flex:1}}>{meta?.icon} {item.name}</span>
                  <span style={{fontSize:11,color:'var(--text3)',minWidth:60,textAlign:'right'}}>現值 {fmt(item.amount)}</span>
                  <input type="number" placeholder="當時金額" value={vals[k]} onChange={setVal(k)}
                    style={{...inputSt,width:130,flex:'none',fontSize:13,padding:'7px 10px'}}/>
                </div>
              );
            })}
          </div>
        </div>
      ))}
      <div style={{display:'flex',gap:10,marginTop:4}}>
        <button style={btnSt(false)} onClick={onClose}>取消</button>
        <button style={{...btnSt(true),flex:1}} disabled={!date||filled===0}
          onClick={handleSave}>儲存 {filled} 筆紀錄</button>
      </div>
    </Modal>
  );
}

function WeeklyTab({assets, liabilities, assetHistory, onAddSnapshot, onEditSnapshot, onEditSnapshotDate}) {
  const [numWeeks, setNumWeeks] = useState(8);
  const snaps = buildWeeklySnapshots(assets, liabilities, assetHistory, numWeeks);
  const cur = snaps[snaps.length-1];
  const prev = snaps[snaps.length-2];
  const diff = k => cur[k] - prev[k];
  const pct  = (k,base=prev[k]) => base>0?((diff(k)/base)*100).toFixed(1):'—';
  const sign  = n => n>0?'+':'';
  const clr   = (n,inv=false) => n>0?(inv?'var(--red)':'var(--green)'):(n<0?(inv?'var(--green)':'var(--red)'):'var(--text3)');

  const catSeries = [
    {label:'現金/存款', color:'var(--accent)',  key:'cash'},
    {label:'股票',      color:'var(--gold)',    key:'stock'},
    {label:'基金/定存', color:'var(--green)',   key:'fund'},
    {label:'加密貨幣',  color:'var(--purple)',  key:'crypto'},
  ].map(s=>({...s, data:snaps.map(w=>({label:w.label,value:w[s.key]}))})).filter(s=>s.data.some(d=>d.value>0));

  const LIAB_COLORS = ['var(--red)','oklch(55% 0.22 15)','var(--orange)','oklch(60% 0.18 30)','var(--purple)','var(--gold)','oklch(50% 0.18 200)'];
  const liabSeries = liabilities.map((l, i) => {
    const data = snaps.map(w => {
      const recs = assetHistory.filter(h=>h.assetId===l.id&&h.isLiab&&h.date<=w.date).sort((a,b)=>b.date.localeCompare(a.date));
      const val = recs.length ? recs[0].amount : ((l.updatedAt||'9999')<=w.date ? l.amount : 0);
      return {label: w.label, value: val};
    });
    return {label: l.name, color: LIAB_COLORS[i % LIAB_COLORS.length], data};
  }).filter(s => s.data.some(d => d.value > 0));

  const kpis = [
    {label:'淨資產',  key:'netWorth', inv:false},
    {label:'總資產',  key:'totalAssets', inv:false},
    {label:'總負債',  key:'totalLiab', inv:true},
  ];

  return (
    <div style={{maxWidth:1140,margin:'0 auto',display:'flex',flexDirection:'column',gap:16}}>
      {/* Controls */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h2 style={{fontSize:16,fontWeight:700}}>資產每週變化</h2>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button onClick={onAddSnapshot} style={{padding:'6px 14px',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer',fontSize:12,fontWeight:500,background:'var(--surface)'}}>+ 新增歷史快照</button>
          <div style={{display:'flex',gap:6}}>
          {[4,8,12].map(n=>(
            <button key={n} onClick={()=>setNumWeeks(n)} style={{padding:'5px 14px',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer',fontSize:12,fontWeight:500,
              background:numWeeks===n?'var(--text)':'var(--surface)',color:numWeeks===n?'white':'var(--text2)'}}>
              {n}週
            </button>
          ))}
          </div>
        </div>
      </div>

      {/* KPI row — vs last week */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
        {kpis.map(k=>(
          <Card key={k.label}>
            <p style={{fontSize:11,color:'var(--text3)',marginBottom:5}}>{k.label}</p>
            <div style={{fontSize:20,fontWeight:700,fontFamily:'var(--mono)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{fmt(cur[k.key])}</div>
            <div style={{marginTop:4,fontSize:11,color:clr(diff(k.key),k.inv)}}>
              {sign(diff(k.key))}{fmt(Math.abs(diff(k.key)))} ({sign(diff(k.key))}{pct(k.key)}%) 較上週
            </div>
          </Card>
        ))}
      </div>

      {/* Three charts in one row */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
        <Card>
          <p style={{fontSize:13,fontWeight:600,marginBottom:14}}>淨資產走勢</p>
          <NetWorthChart snaps={snaps} series={[
            {label:'淨資產', color:'var(--text)', data:snaps.map(w=>({label:w.label,value:w.netWorth}))},
            {label:'總資產', color:'var(--green)', data:snaps.map(w=>({label:w.label,value:w.totalAssets}))},
            {label:'總負債', color:'var(--red)',  data:snaps.map(w=>({label:w.label,value:w.totalLiab}))},
          ]} height={150}/>
          <div style={{display:'flex',gap:16,marginTop:8}}>
            {[['淨資產','var(--text)'],['總資產','var(--green)'],['總負債','var(--red)']].map(([l,c])=>(
              <span key={l} style={{fontSize:11,display:'flex',alignItems:'center',gap:5}}><span style={{width:14,height:3,borderRadius:2,background:c,display:'inline-block'}}/>{l}</span>
            ))}
          </div>
        </Card>
        <Card>
          <p style={{fontSize:13,fontWeight:600,marginBottom:10}}>資產分類走勢</p>
          {catSeries.length>=1 ? <MultiLineChart series={catSeries} height={150}/> : <p style={{color:'var(--text3)',fontSize:13}}>尚無資料</p>}
        </Card>
        <Card>
          <p style={{fontSize:13,fontWeight:600,marginBottom:10}}>負債分類走勢</p>
          {liabSeries.length>=1 ? <MultiLineChart series={liabSeries} height={150}/> : <p style={{color:'var(--text3)',fontSize:13}}>尚無資料</p>}
        </Card>
      </div>

      {/* Week-by-week table */}
      <Card style={{padding:0,overflow:'hidden'}}>
        <div style={{padding:'14px 18px 12px',borderBottom:'1px solid var(--border)'}}><p style={{fontSize:13,fontWeight:600}}>逐週快照</p></div>
        <div style={{overflow:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12,fontFamily:'var(--mono)'}}>
            <thead>
              <tr style={{background:'var(--surface2)'}}>
                {['週末日期','淨資產','較前週','總資產','總負債','現金/存款','股票/基金','加密貨幣'].map(h=>(
                  <th key={h} style={{padding:'8px 14px',textAlign:h==='週末日期'?'left':'right',fontWeight:600,color:'var(--text2)',whiteSpace:'nowrap',fontSize:11}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {[...snaps].reverse().map((w,i,arr)=>{
                const p=arr[i+1], nd=p?w.netWorth-p.netWorth:null;
                const isLatest=i===0;
                return (
                  <tr key={w.date} style={{borderTop:'1px solid var(--border)',background:isLatest?'var(--surface2)':'transparent'}}>
                    <td style={{padding:'9px 14px',color:'var(--text2)',fontWeight:isLatest?700:400}}>
                      <div style={{display:'flex',alignItems:'center',gap:4}}>
                        <input type="date" defaultValue={w.date} title="點擊修改此快照日期"
                          onBlur={e=>{ if(e.target.value && e.target.value!==w.date) onEditSnapshotDate(w.date, e.target.value); }}
                          onClick={e=>e.stopPropagation()}
                          style={{border:'none',background:'transparent',color:'inherit',fontFamily:'var(--mono)',fontSize:12,
                            fontWeight:isLatest?700:400,cursor:'pointer',padding:0,outline:'none',width:116}}/>
                        <button title="編輯此快照數值" onClick={()=>onEditSnapshot(w.date)}
                          style={{border:'none',background:'none',cursor:'pointer',padding:'2px 3px',fontSize:11,opacity:0.4,lineHeight:1}}>✏️</button>
                      </div>
                    </td>
                    <td style={{padding:'9px 14px',textAlign:'right',fontWeight:700}}>{fmt(w.netWorth)}</td>
                    <td style={{padding:'9px 14px',textAlign:'right',color:nd==null?'var(--text3)':nd>=0?'var(--green)':'var(--red)'}}>
                      {nd==null?'—':`${sign(nd)}${fmt(Math.abs(nd))}`}
                    </td>
                    <td style={{padding:'9px 14px',textAlign:'right',color:'var(--green)'}}>{fmt(w.totalAssets)}</td>
                    <td style={{padding:'9px 14px',textAlign:'right',color:'var(--red)'}}>{fmt(w.totalLiab)}</td>
                    <td style={{padding:'9px 14px',textAlign:'right'}}>{fmt(w.cash)}</td>
                    <td style={{padding:'9px 14px',textAlign:'right'}}>{fmt(w.stock+w.fund)}</td>
                    <td style={{padding:'9px 14px',textAlign:'right'}}>{fmt(w.crypto)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}
