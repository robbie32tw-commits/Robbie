// ── Cash Tab (收入記帳 + 繳款紀錄) ────────────────────────────────────────────
function CashTab({incomeRecords, onAddIncome, onEditIncome, onDeleteIncome,
                  paymentRecords, onAddPayment, onEditPayment, onDeletePayment, onTogglePayment,
                  recurringPayments, onAddRecurringItem, onEditRecurringItem, onDeleteRecurring, onCreateThisMonth}) {
  const PER_PAGE = 25;
  const [page, setPage] = useState(0);
  const [recurringOpen, setRecurringOpen] = useState(true);
  const [search, setSearch] = useState('');
  const [selMonth, setSelMonth] = useState('all');

  // Merge and sort all records newest-first
  const allRecords = React.useMemo(() => {
    const inc = incomeRecords.map(r => ({...r, _kind:'income', _label:r.desc}));
    const pay = paymentRecords.map(r => ({...r, _kind:'payment', _label:r.name}));
    return [...inc, ...pay].sort((a,b) => b.date.localeCompare(a.date));
  }, [incomeRecords, paymentRecords]);

  // get all available months
  const availableMonths = React.useMemo(() => {
    const s = new Set(allRecords.map(r => r.date.slice(0,7)));
    return [...s].sort((a,b)=>b.localeCompare(a));
  }, [allRecords]);

  const filteredRecords = React.useMemo(() => {
    let list = allRecords;
    if (selMonth !== 'all') {
      list = list.filter(r => r.date.startsWith(selMonth));
    }
    const q = search.trim().toLowerCase();
    if (!q) return list;
    return list.filter(r =>
      r._label?.toLowerCase().includes(q) ||
      r.note?.toLowerCase().includes(q) ||
      r.date?.includes(q) ||
      String(r.amount).includes(q)
    );
  }, [allRecords, search, selMonth]);

  const totalPages = Math.ceil(filteredRecords.length / PER_PAGE);
  const pageRecords = filteredRecords.slice(page * PER_PAGE, (page + 1) * PER_PAGE);

  // Summary stats
  const now = new Date();
  const thisMonthStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const lastMonthDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const lastMonthStr = `${lastMonthDate.getFullYear()}-${String(lastMonthDate.getMonth()+1).padStart(2,'0')}`;

  const thisMonthIncome = incomeRecords.filter(r => r.date.startsWith(thisMonthStr)).reduce((s,r) => s+r.amount, 0);
  const thisMonthPayment = paymentRecords.filter(r => r.date.startsWith(thisMonthStr)).reduce((s,r) => s+r.amount, 0);
  const lastMonthIncome = incomeRecords.filter(r => r.date.startsWith(lastMonthStr)).reduce((s,r) => s+r.amount, 0);
  const lastMonthPayment = paymentRecords.filter(r => r.date.startsWith(lastMonthStr)).reduce((s,r) => s+r.amount, 0);
  const selIncome = selMonth==='all'?0:incomeRecords.filter(r => r.date.startsWith(selMonth)).reduce((s,r) => s+r.amount, 0);
  const selPayment = selMonth==='all'?0:paymentRecords.filter(r => r.date.startsWith(selMonth)).reduce((s,r) => s+r.amount, 0);

  // Current month recurring status
  const recurringStatus = React.useMemo(() => {
    return (recurringPayments||[]).map(rc => {
      const existing = paymentRecords.find(p => p.name===rc.name && p.date.startsWith(thisMonthStr));
      return {...rc, existing};
    });
  }, [recurringPayments, paymentRecords, thisMonthStr]);

  // Render list with month dividers
  const rows = [];
  let lastMonth = null;
  pageRecords.forEach((r, i) => {
    const m = r.date.slice(0,7);
    if (m !== lastMonth) {
      lastMonth = m;
      const [y, mo] = m.split('-');
      rows.push(
        <div key={`div-${m}`} style={{display:'flex',alignItems:'center',gap:10,margin:'4px 0'}}>
          <div style={{height:1,flex:1,background:'var(--border)'}}/>
          <span style={{fontSize:11,fontWeight:600,color:'var(--text3)',whiteSpace:'nowrap',padding:'0 4px'}}>{y}年{parseInt(mo)}月</span>
          <div style={{height:1,flex:1,background:'var(--border)'}}/>
        </div>
      );
    }

    if (r._kind === 'income') {
      const meta = INCOME_CATS[r.category] || {icon:'💰', color:'var(--green)', label:r.category};
      rows.push(
        <div key={r.id} style={{display:'flex',alignItems:'center',gap:14,padding:'12px 18px',borderBottom:'1px solid var(--border)'}}>
          <div style={{width:36,height:36,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,background:'var(--green-bg)',flexShrink:0}}>{meta.icon}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
              <span style={{fontWeight:500,fontSize:14}}>{r._label}</span>
              <Tag color={meta.color} bg='var(--green-bg)'>{meta.label}</Tag>
            </div>
            <div style={{display:'flex',gap:10,marginTop:2}}>
              <span style={{fontSize:11,color:'var(--text3)'}}>{r.date}</span>
              {r.note&&<span style={{fontSize:11,color:'var(--text3)'}}>{r.note}</span>}
            </div>
          </div>
          <span style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:15,color:'var(--green)',minWidth:110,textAlign:'right'}}>+{fmt(r.amount)}</span>
          <div style={{display:'flex',gap:2,flexShrink:0}}>
            <button onClick={()=>onEditIncome(r)} style={{background:'none',border:'none',cursor:'pointer',fontSize:14,color:'var(--text3)',padding:4}}>✏️</button>
            <button onClick={()=>onDeleteIncome(r.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:14,color:'var(--text3)',padding:4}}>🗑</button>
          </div>
        </div>
      );
    } else {
      const meta = PAYMENT_CATS[r.category] || {icon:'💳', color:'var(--red)', label:r.category};
      rows.push(
        <div key={r.id} style={{display:'flex',alignItems:'center',gap:14,padding:'12px 18px',borderBottom:'1px solid var(--border)'}}>
          <div style={{width:36,height:36,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,background:'var(--surface2)',flexShrink:0}}>{meta.icon}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
              <span style={{fontWeight:500,fontSize:14}}>{r._label}</span>
              <Tag color={meta.color} bg='var(--surface2)'>{meta.label}</Tag>
            </div>
            <div style={{display:'flex',gap:10,marginTop:2}}>
              <span style={{fontSize:11,color:'var(--text3)'}}>{r.date}</span>
              {r.note&&<span style={{fontSize:11,color:'var(--text3)'}}>{r.note}</span>}
            </div>
          </div>
          <span style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:15,color:'var(--red)',minWidth:110,textAlign:'right'}}>{fmt(r.amount)}</span>
          <div style={{display:'flex',gap:2,flexShrink:0}}>
            <button onClick={()=>onEditPayment(r)} style={{background:'none',border:'none',cursor:'pointer',fontSize:14,color:'var(--text3)',padding:4}}>✏️</button>
            <button onClick={()=>onDeletePayment(r.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:14,color:'var(--text3)',padding:4}}>🗑</button>
          </div>
        </div>
      );
    }
  });

  return (
    <div style={{maxWidth:1140,margin:'0 auto',display:'flex',flexDirection:'column',gap:14}}>

      {/* KPI summary row */}
      <div style={{display:'grid',gridTemplateColumns:selMonth==='all'?'repeat(auto-fit, minmax(200px, 1fr))':'repeat(auto-fit, minmax(250px, 1fr))',gap:12}}>
        {selMonth === 'all' ? (
          <>
            <Card style={{borderLeft:'3px solid var(--green)'}}>
              <p style={{fontSize:11,color:'var(--text3)',marginBottom:5}}>本月收入</p>
              <div style={{fontSize:20,fontWeight:700,fontFamily:'var(--mono)',color:'var(--green)'}}>{fmt(thisMonthIncome)}</div>
            </Card>
            <Card style={{borderLeft:'3px solid var(--red)'}}>
              <p style={{fontSize:11,color:'var(--text3)',marginBottom:5}}>本月支出</p>
              <div style={{fontSize:20,fontWeight:700,fontFamily:'var(--mono)',color:'var(--red)'}}>{fmt(thisMonthPayment)}</div>
            </Card>
            <Card style={{borderLeft:'3px solid var(--green)',opacity:0.8}}>
              <p style={{fontSize:11,color:'var(--text3)',marginBottom:5}}>上月收入</p>
              <div style={{fontSize:20,fontWeight:700,fontFamily:'var(--mono)',color:'var(--green)'}}>{fmt(lastMonthIncome)}</div>
            </Card>
            <Card style={{borderLeft:'3px solid var(--red)',opacity:0.8}}>
              <p style={{fontSize:11,color:'var(--text3)',marginBottom:5}}>上月支出</p>
              <div style={{fontSize:20,fontWeight:700,fontFamily:'var(--mono)',color:'var(--red)'}}>{fmt(lastMonthPayment)}</div>
            </Card>
          </>
        ) : (
          <>
            <Card style={{borderLeft:'3px solid var(--green)'}}>
              <p style={{fontSize:11,color:'var(--text3)',marginBottom:5}}>{selMonth.replace('-','年')}月 收入</p>
              <div style={{fontSize:20,fontWeight:700,fontFamily:'var(--mono)',color:'var(--green)'}}>{fmt(selIncome)}</div>
            </Card>
            <Card style={{borderLeft:'3px solid var(--red)'}}>
              <p style={{fontSize:11,color:'var(--text3)',marginBottom:5}}>{selMonth.replace('-','年')}月 支出</p>
              <div style={{fontSize:20,fontWeight:700,fontFamily:'var(--mono)',color:'var(--red)'}}>{fmt(selPayment)}</div>
            </Card>
            <Card style={{borderLeft:'3px solid var(--accent)'}}>
              <p style={{fontSize:11,color:'var(--text3)',marginBottom:5}}>淨現金流</p>
              <div style={{fontSize:20,fontWeight:700,fontFamily:'var(--mono)',color:selIncome>=selPayment?'var(--green)':'var(--red)'}}>{selIncome>=selPayment?'+':''}{fmt(selIncome-selPayment)}</div>
            </Card>
          </>
        )}
      </div>

      {/* 本月固定繳款 */}
      {recurringStatus.length>0&&(
        <Card style={{padding:'14px 18px'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}} onClick={()=>setRecurringOpen(o=>!o)}>
            <span style={{fontWeight:700,fontSize:13}}>📋 本月固定繳款</span>
            <span style={{fontSize:11,color:'var(--text3)'}}>{thisMonthStr.replace('-','年')}月</span>
            <span style={{fontSize:11,color:'var(--text3)'}}>· {recurringStatus.length} 筆</span>
            <div style={{flex:1}}/>
            <button onClick={e=>{e.stopPropagation();onAddRecurringItem();}}
              style={{padding:'4px 12px',borderRadius:7,border:'1px solid var(--border)',cursor:'pointer',fontSize:12,background:'var(--surface)',color:'var(--text2)'}}>
              + 新增固定項目
            </button>
            <span style={{fontSize:12,color:'var(--text3)',transition:'transform 0.2s',display:'inline-block',transform:recurringOpen?'rotate(180deg)':'rotate(0deg)'}}>▼</span>
          </div>
          {recurringOpen&&<div style={{display:'flex',flexDirection:'column',gap:8,marginTop:12}}>
            {recurringStatus.map(rc=>{
              const meta = PAYMENT_CATS[rc.category]||{icon:'💳',label:rc.category};
              const done = !!rc.existing;
              return (
                <div key={rc.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',borderRadius:10,
                  background:done?'var(--green-bg)':'var(--surface2)',
                  border:`1px solid ${done?'var(--green)':'var(--border)'}`}}>
                  <span style={{fontSize:18}}>{meta.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13}}>{rc.name}</div>
                    <div style={{fontSize:11,color:'var(--text3)'}}>每月 {rc.dueDay} 號 · {meta.label}{rc.note?` · ${rc.note}`:''}</div>
                  </div>
                  <span style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:14,minWidth:90,textAlign:'right',
                    color:done?'var(--green)':'var(--text)'}}>{fmt(rc.amount)}</span>
                  {done
                    ? <span style={{fontSize:12,fontWeight:600,color:'var(--green)',minWidth:48,textAlign:'center'}}>✅ 已建立</span>
                    : <button onClick={()=>onCreateThisMonth(rc)}
                        style={{padding:'5px 12px',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer',fontSize:12,fontWeight:600,
                          background:'var(--text)',color:'white',flexShrink:0,whiteSpace:'nowrap'}}>
                        ＋ 建立支出
                      </button>
                  }
                  <div style={{display:'flex',gap:2,flexShrink:0}}>
                    <button onClick={()=>onEditRecurringItem(rc)} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--text3)',padding:3}}>✏️</button>
                    <button onClick={()=>onDeleteRecurring(rc.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--text3)',padding:3}}>🗑</button>
                  </div>
                </div>
              );
            })}
          </div>}
        </Card>
      )}

      {/* Toolbar */}
      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
        <select value={selMonth} onChange={e=>{setSelMonth(e.target.value);setPage(0);}}
          style={{...inputSt,width:'auto',fontSize:12,padding:'6px 10px'}}>
          <option value="all">全部月份</option>
          {availableMonths.map(m=><option key={m} value={m}>{m.replace('-','年')}月</option>)}
        </select>
        <input value={search} onChange={e=>{setSearch(e.target.value);setPage(0);}}
          placeholder="搜尋名稱、備註、日期…"
          style={{...inputSt,width:160,fontSize:12,padding:'6px 10px'}}/>
        <span style={{fontSize:13,color:'var(--text3)'}}>
          {search ? `${filteredRecords.length} / ${allRecords.length} 筆` : `共 ${allRecords.length} 筆記錄`}
        </span>
        <div style={{flex:1}}/>
        <span style={{fontSize:12,color:'var(--text3)'}}>新增收入：</span>
        {Object.entries(INCOME_CATS).map(([k,v])=>(
          <button key={k} onClick={()=>onAddIncome(k)}
            style={{padding:'6px 12px',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer',fontSize:12,background:'var(--green-bg)',fontWeight:500,color:'var(--green)'}}>
            + {v.label}
          </button>
        ))}
        <span style={{fontSize:12,color:'var(--text3)',marginLeft:4}}>支出：</span>
        {Object.entries(PAYMENT_CATS).map(([k,v])=>(
          <button key={k} onClick={()=>onAddPayment(k)}
            style={{padding:'6px 12px',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer',fontSize:12,background:'var(--surface)',fontWeight:500}}>
            + {v.label}
          </button>
        ))}
        {recurringStatus.length===0&&(
          <button onClick={onAddRecurringItem}
            style={{padding:'6px 12px',borderRadius:8,border:'1px dashed var(--border)',cursor:'pointer',fontSize:12,background:'var(--surface)',color:'var(--text3)',marginLeft:4}}>
            📋 設定固定項目
          </button>
        )}
      </div>

      {/* Unified list */}
      <Card style={{padding:0,overflow:'hidden'}}>
        {allRecords.length===0
          ? <div style={{textAlign:'center',padding:'48px 0',color:'var(--text3)'}}>尚無記錄，點擊上方按鈕新增</div>
          : rows
        }
      </Card>

      {/* Pagination */}
      {totalPages>1&&(
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0}
            style={{padding:'6px 14px',borderRadius:8,border:'1px solid var(--border)',cursor:page===0?'default':'pointer',fontSize:13,background:'var(--surface)',opacity:page===0?0.4:1}}>←</button>
          {Array.from({length:totalPages},(_,i)=>(
            <button key={i} onClick={()=>setPage(i)}
              style={{width:32,height:32,borderRadius:8,border:'1px solid var(--border)',cursor:'pointer',fontSize:13,fontWeight:i===page?700:400,
                background:i===page?'var(--text)':'var(--surface)',color:i===page?'white':'var(--text2)'}}>
              {i+1}
            </button>
          ))}
          <button onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))} disabled={page===totalPages-1}
            style={{padding:'6px 14px',borderRadius:8,border:'1px solid var(--border)',cursor:page===totalPages-1?'default':'pointer',fontSize:13,background:'var(--surface)',opacity:page===totalPages-1?0.4:1}}>→</button>
        </div>
      )}

    </div>
  );
}

// ── Stable Asset Tab ──────────────────────────────────────────────────────────
function StableAssetTab({items, onAdd, onEdit, onDelete}) {
  const assetCats = ['bank_cash','bank_deposit','pinebridge'];

  const totalPos  = items.filter(i=>assetCats.includes(i.category)).reduce((s,i)=>s+i.amount, 0);

  const renderSection = (catKey) => {
    const catItems = items.filter(i=>i.category===catKey);

    const sub  = catItems.reduce((s,i)=>s+i.amount, 0);
    return (
      <div key={catKey} style={{marginBottom:12}}>

          background:'var(--surface2)',borderRadius:catItems.length?'10px 10px 0 0':10,

          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:12,fontFamily:'var(--mono)',fontWeight:600,color:meta.isLiab?'var(--red)':undefined}}>{fmt(sub)}</span>
            <button onClick={()=>onAdd(catKey)} style={{fontSize:11,padding:'3px 8px',borderRadius:6,border:'1px solid var(--border)',cursor:'pointer',background:'var(--surface)',color:'var(--text2)'}}>+</button>
          </div>
        </div>
        {catItems.map((itm,i)=>(
          <div key={itm.id} style={{padding:'10px 12px',background:'var(--surface)',border:'1px solid var(--border)',borderTop:'none',borderRadius:i===catItems.length-1?'0 0 10px 10px':0}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{flex:1}}>
                <p style={{fontSize:13,fontWeight:500}}>{itm.name}</p>
                <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                  {itm.rate!=null&&<Tag color={meta.color} bg={meta.color.replace(')',',0.12)').replace('var(','rgba(').replace('--','').replace(')',')')} >{itm.rate}%</Tag>}
                  {itm.note&&<p style={{fontSize:11,color:'var(--text3)'}}>{itm.note}</p>}
                  {itm.updatedAt&&<p style={{fontSize:10,color:((new Date()-new Date(itm.updatedAt))/(864e5))>30?'var(--red)':'var(--text3)'}}>更新於 {itm.updatedAt}</p>}
                </div>
              </div>
              <span style={{fontSize:13,fontFamily:'var(--mono)',color:meta.isLiab?'var(--red)':undefined}}>{fmt(itm.amount)}</span>
              <button onClick={()=>onEdit(itm)} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--text3)',padding:4}}>✏️</button>
              <button onClick={()=>onDelete(itm.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--text3)',padding:4}}>🗑</button>
            </div>
            <div style={{marginTop:6,height:3,background:'var(--surface2)',borderRadius:2,overflow:'hidden'}}>
              <div style={{width:`${sub>0?(itm.amount/sub*100):0}%`,height:'100%',background:meta.color,borderRadius:2,opacity:0.6}}/>
            </div>
          </div>
        ))}
      </div>
    );
  };

  return (
    <div style={{maxWidth:1140,margin:'0 auto',display:'flex',flexDirection:'column',gap:16}}>
      {/* KPI row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
        {[
          {label:'穩定資產小計', value:fmt(totalPos), color:'var(--green)'},
          {label:'負債小計',      value:fmt(totalNeg), color:'var(--red)'},
          {label:'穩定淨資產',   value:(net>=0?'+':'-')+fmt(Math.abs(net)), color:net>=0?'var(--green)':'var(--red)'},

          <Card key={k.label} style={{borderLeft:`3px solid ${k.color}`}}>

            <div style={{fontSize:22,fontWeight:700,fontFamily:'var(--mono)',color:k.color}}>{k.value}</div>
          </Card>
        ))}
      </div>

      {/* Two columns */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        {/* Left: asset categories */}
        <div>
          {assetCats.map(cat=>renderSection(cat))}
          <div style={{padding:'10px 12px',background:'var(--green-bg)',borderRadius:10,display:'flex',justifyContent:'space-between'}}>
            <span style={{fontWeight:600,color:'var(--green)'}}>資產小計</span>

          <div style={{padding:'10px 12px',background:'var(--red-bg)',borderRadius:10,display:'flex',justifyContent:'space-between'}}>

            <span style={{fontFamily:'var(--mono)',fontWeight:700,color:'var(--red)',fontSize:16}}>{fmt(totalNeg)}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Investment Tab ─────────────────────────────────────────────────────────────
function InvestmentTab({investments, assets=[], liabilities=[], assetHistory=[], fxRate, setFxRate, onAdd, onEdit, onDelete, onUpdatePrices}) {
  const [sortBy, setSortBy] = useState('value');
  const [editingFx, setEditingFx] = useState(false);
  const [fxInput, setFxInput] = useState(String(fxRate));
  const [fxFetching, setFxFetching] = useState(false);
  const [priceRefreshing, setPriceRefreshing] = useState(false);
  const [lastPriceAt, setLastPriceAt] = useState(null);

  const refreshPrices = async () => {
    setPriceRefreshing(true);
    const priceMap = {};
    let successes = 0;
    const failures = [];

    // 台股：TWSE 官方 API
    const twInvs = investments.filter(i=>['tw_stock','stock'].includes(i.category)&&i.ticker);
    if (twInvs.length > 0) {
      try {
        const fetch1 = async (prefix, invs) => {
          const exCh = invs.map(i=>`${prefix}_${i.ticker}.tw`).join('|');
          const r = await fetch(`https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=${exCh}&json=1&delay=0`,{cache:'no-store'});
          return (await r.json()).msgArray||[];
        };
        const rows = await fetch1('tse', twInvs);
        const found = new Set();
        rows.forEach(q=>{
          const p = parseFloat(q.z!=='-'?q.z:(q.pz||q.y));
          const inv = twInvs.find(i=>i.ticker===q.c);
          if(inv&&!isNaN(p)&&p>0){priceMap[inv.id]=p;found.add(inv.ticker);successes++;}
        });
        const missed = twInvs.filter(i=>!found.has(i.ticker));
        if(missed.length){
          const rows2 = await fetch1('otc', missed);
          rows2.forEach(q=>{
            const p = parseFloat(q.z!=='-'?q.z:(q.pz||q.y));
            const inv = missed.find(i=>i.ticker===q.c);
            if(inv&&!isNaN(p)&&p>0){priceMap[inv.id]=p;successes++;}
          });
        }
      } catch(e){console.error('台股 fetch error:',e);failures.push('台股');}
    }

    // 美股：Yahoo Finance v8 chart（支援 CORS）
    const usInvs = investments.filter(i=>i.category==='us_stock'&&i.ticker);
    if (usInvs.length > 0) {
      let usFailed = false;
      await Promise.all(usInvs.map(async inv => {
        try {
          const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(inv.ticker)}?interval=1d&range=5d`,{cache:'no-store'});
          const d = await r.json();
          const price = d.chart?.result?.[0]?.meta?.regularMarketPrice;
          if(price!=null){priceMap[inv.id]=parseFloat(price.toFixed(2));successes++;}
          else usFailed=true;
        } catch(e){console.error(`美股 ${inv.ticker}:`,e);usFailed=true;}
      }));
      if(usFailed) failures.push('部分美股');
    }

    // 加密貨幣：CoinGecko
    const cryptoInvs = investments.filter(i=>i.category==='crypto');
    if (cryptoInvs.length > 0) {
      try {
        const cgMap = {};
        cryptoInvs.forEach(inv=>{
          const id=CRYPTO_CG[inv.name]||CRYPTO_CG[(inv.ticker||'').toUpperCase()];
          if(id) cgMap[inv.id]=id;
        });
        const ids=[...new Set(Object.values(cgMap))];
        if(ids.length){
          const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids.join(',')}&vs_currencies=usd`,{cache:'no-store'});
          const d = await r.json();
          Object.entries(cgMap).forEach(([invId,cgId])=>{
            const usd=d[cgId]?.usd;
            if(usd){priceMap[invId]=parseFloat((usd*fxRate).toFixed(0));successes++;}
          });
        }
      } catch(e){failures.push('加密貨幣');}
    }

    // AI fallback：用 Gemini + Google Search 補齊直接 API 抓不到的 ticker
    const missingTW = twInvs.filter(i=>priceMap[i.id]==null);
    const missingUS = usInvs.filter(i=>priceMap[i.id]==null);
    if (missingTW.length > 0 || missingUS.length > 0) {
      const aiKey = localStorage.getItem('hj_apikey');
      if (aiKey) {
        try {
          const lines = [];
          if (missingTW.length) lines.push(`台股（回傳台幣股價）：${missingTW.map(i=>i.ticker).join(', ')}`);
          if (missingUS.length) lines.push(`美股（回傳美元股價）：${missingUS.map(i=>i.ticker).join(', ')}`);
          const prompt = `請用 Google Search 查詢以下股票今日的最新股價，只回傳一個 JSON 物件，不要任何說明：\n${lines.join('\n')}\n\n格式：{"tw":{"代號":價格},"us":{"代號":價格}}`;
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${aiKey}`, {
            method:'POST', headers:{'content-type':'application/json'},
            body: JSON.stringify({
              contents:[{role:'user',parts:[{text:prompt}]}],
              tools:[{google_search:{}}]
            })
          });
          if (res.ok) {
            const d = await res.json();
            const text = d.candidates?.[0]?.content?.parts?.find(p=>p.text)?.text||'';
            const m = text.match(/\{[\s\S]*\}/);
            if (m) {
              const prices = JSON.parse(m[0]);
              missingTW.forEach(inv=>{
                const p=prices.tw?.[inv.ticker];
                if(p!=null&&!isNaN(p)){
                  priceMap[inv.id]=parseFloat(p);
                  successes++;
                  const idx=failures.indexOf('台股');
                  if(idx>=0) failures.splice(idx,1);
                }
              });
              missingUS.forEach(inv=>{
                const p=prices.us?.[inv.ticker];
                if(p!=null&&!isNaN(p)){
                  priceMap[inv.id]=parseFloat(parseFloat(p).toFixed(2));
                  successes++;
                  const idx=failures.indexOf('部分美股');
                  if(idx>=0) failures.splice(idx,1);
                }
              });
            }
          }
        } catch(e){console.error('AI 現價 fallback error:',e);}
      }
    }

    if(successes>0) onUpdatePrices(priceMap);
    const now=new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    setLastPriceAt(successes>0?now:lastPriceAt);
    const msg = successes>0
      ? `✅ 已更新 ${successes} 筆現價${failures.length?`（${failures.join('、')}失敗）`:''}`
      : `❌ 現價更新失敗${failures.length?`：${failures.join('、')}`:''}`;
    alert(msg);
    setPriceRefreshing(false);
  };

  // Enrich: for us_stock, costPrice/currentPrice are stored as USD
  // If usdCostPrice is explicitly set, use it; otherwise treat costPrice as USD
  const enriched = investments.map(inv => {
    const qty = parseFloat(inv.quantity) || 0;
    let usdCostPrice, usdCurrentPrice, twdCost, twdCurr;
    if (inv.category === 'us_stock') {
      usdCostPrice    = parseFloat(inv.usdCostPrice    != null ? inv.usdCostPrice    : inv.costPrice)    || 0;
      usdCurrentPrice = parseFloat(inv.usdCurrentPrice != null ? inv.usdCurrentPrice : inv.currentPrice) || 0;
      twdCost = usdCostPrice    * fxRate;
      twdCurr = usdCurrentPrice * fxRate;
    } else {
      usdCostPrice = null; usdCurrentPrice = null;
      twdCost = parseFloat(inv.costPrice)    || 0;
      twdCurr = parseFloat(inv.currentPrice) || 0;
    }
    const mv   = qty * twdCurr;
    const cost = qty * twdCost;
    const pnl  = mv - cost;
    const roi  = cost > 0 ? (pnl / cost) * 100 : 0;
    return {...inv, quantity:qty, usdCostPrice, usdCurrentPrice, twdCostPrice:twdCost, twdCurrentPrice:twdCurr, mv, cost, pnl, roi};
  });
  const sorted = [...enriched].sort((a,b)=>{
    if(sortBy==='value') return b.mv-a.mv;
    if(sortBy==='pnl') return b.pnl-a.pnl;
    if(sortBy==='roi') return b.roi-a.roi;
    return 0;
  });
  const totalMV   = enriched.reduce((s,i)=>s+i.mv,0);
  const totalCost = enriched.reduce((s,i)=>s+i.cost,0);
  const totalPnL  = totalMV - totalCost;
  const totalROI  = totalCost>0?(totalPnL/totalCost)*100:0;

  // ── 三個自訂 KPI ──
  const findA = name => (assets.find(a=>a.name===name)?.amount)||0;
  const findL = name => (liabilities.find(l=>l.name===name)?.amount)||0;
  const 借貸總額      = findL('國泰信貸3.93%') + findL('國泰信貸5.24%');
  const 投資帳戶現金  = findA('國泰世華808') + findA('未交割入帳（台股）') + findA('未交割入帳（美股）');
  const 投資淨利      = totalCost + 投資帳戶現金 - 借貸總額;

  const pnlHistory = React.useMemo(()=>{
    const NUM = 12;
    const getHistVal = (isLiab, name) => wDate => {
      const item = isLiab ? liabilities.find(l=>l.name===name) : assets.find(a=>a.name===name);
      if(!item) return 0;
      const recs = assetHistory.filter(h=>h.assetId===item.id&&h.isLiab===isLiab&&h.date<=wDate).sort((a,b)=>b.date.localeCompare(a.date));
      if(recs.length) return recs[0].amount;
      return (item.updatedAt||'9999')<=wDate ? item.amount : 0;
    };
    const get808    = getHistVal(false,'國泰世華808');
    const getTW     = getHistVal(false,'未交割入帳（台股）');
    const getUS     = getHistVal(false,'未交割入帳（美股）');
    const getLoan1  = getHistVal(true, '國泰信貸3.93%');
    const getLoan2  = getHistVal(true, '國泰信貸5.24%');
    return Array.from({length:NUM},(_,i)=>{
      const d=new Date(); d.setDate(d.getDate()-(NUM-1-i)*7);
      const wDate=d.toISOString().split('T')[0];
      const mm=d.getMonth()+1, dd=d.getDate();
      const 帳戶現金 = get808(wDate)+getTW(wDate)+getUS(wDate);
      const 借貸     = getLoan1(wDate)+getLoan2(wDate);
      return {label:`${mm}/${dd}`, value: totalCost+帳戶現金-借貸};
    });
  },[investments,assets,liabilities,assetHistory,totalCost]);

  const GROUPS = [
    {id:'tw',     label:'台股',     icon:'🇹🇼', color:'var(--red)',             cats:['tw_stock','stock']},
    {id:'us',     label:'美股',     icon:'🇺🇸', color:'oklch(52% 0.14 240)',    cats:['us_stock']},
    {id:'crypto', label:'加密貨幣',  icon:'₿',   color:'var(--purple)',          cats:['crypto']},
    {id:'etf',    label:'ETF / 基金',icon:'🏛',  color:'var(--accent)',          cats:['etf','fund']},
  ];

  const byCategory = GROUPS.map(g=>({
    label:g.label, color:g.color,
    value:enriched.filter(i=>g.cats.includes(i.category)).reduce((s,i)=>s+i.mv,0),
  })).filter(d=>d.value>0);

  const pnlColor = n => n>=0?'var(--red)':'var(--green)';
  const pnlSign  = n => n>=0?'+':'';

  const refreshFx = async () => {
    setFxFetching(true);
    try {
      const r = await fetch('https://open.er-api.com/v6/latest/USD');
      const d = await r.json();
      if(d.rates?.TWD) { const v=parseFloat(d.rates.TWD.toFixed(2)); setFxRate(v); setFxInput(String(v)); }
    } catch(e) { alert('匯率更新失敗，請手動輸入'); }
    setFxFetching(false);
  };

  const ColHeader = ({isUs}) => (
    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr 1.2fr 60px',gap:8,padding:'8px 18px',background:'var(--surface2)',fontSize:11,color:'var(--text3)',fontWeight:600}}>
      <span>名稱 / 代號</span>
      <span style={{textAlign:'right'}}>持有量</span>
      <span style={{textAlign:'right'}}>{isUs?'成本 (USD)':'成本均價'}</span>
      <span style={{textAlign:'right'}}>{isUs?'現價 (USD)':'現價'}</span>
      <span style={{textAlign:'right'}}>市值 / 損益</span>
      <span/>
    </div>
  );

  const InvRow = ({inv}) => {
    const meta  = INV_CAT[inv.category]||GROUPS[0];
    const isUs  = inv.category === 'us_stock';
    const fmtUsd = n => `$${n?.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})||'—'}`;
    return (
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr 1.2fr 60px',gap:8,padding:'13px 18px',alignItems:'center',borderTop:'1px solid var(--border)'}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:14,fontWeight:500}}>{inv.name}</span>
            {inv.ticker&&<Tag color={meta.color} bg="var(--surface2)">{inv.ticker}</Tag>}
          </div>
          {inv.note&&<span style={{fontSize:11,color:'var(--text3)'}}>{inv.note}</span>}
        </div>
        <div style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:13}}>{inv.quantity.toLocaleString()}</div>
        <div style={{textAlign:'right'}}>
          {isUs
            ? <><div style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--text2)'}}>{fmtUsd(inv.usdCostPrice)}</div>
                <div style={{fontSize:10,color:'var(--text3)'}}>≈ {fmt(inv.twdCostPrice)} TWD</div></>
            : <div style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--text2)'}}>{fmt(inv.costPrice)}</div>
          }
        </div>
        <div style={{textAlign:'right'}}>
          {isUs
            ? <><div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:500}}>{fmtUsd(inv.usdCurrentPrice)}</div>
                <div style={{fontSize:10,color:pnlColor(inv.roi)}}>{pnlSign(inv.roi)}{inv.roi.toFixed(2)}%</div></>
            : <><div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:500}}>{fmt(inv.currentPrice)}</div>
                <div style={{fontSize:11,color:pnlColor(inv.roi)}}>{pnlSign(inv.roi)}{inv.roi.toFixed(2)}%</div></>
          }
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:600}}>{fmt(inv.mv)}</div>
          <div style={{fontSize:11,fontFamily:'var(--mono)',color:pnlColor(inv.pnl)}}>{pnlSign(inv.pnl)}{fmt(inv.pnl)}</div>
        </div>
        <div style={{display:'flex',gap:2}}>
          <button onClick={()=>onEdit(inv)} style={{background:'none',border:'none',cursor:'pointer',fontSize:14,color:'var(--text3)',padding:4}}>✏️</button>
          <button onClick={()=>onDelete(inv.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:14,color:'var(--text3)',padding:4}}>🗑</button>
        </div>
      </div>
    );
  };

  return (
    <div style={{maxWidth:1140,margin:'0 auto',display:'flex',flexDirection:'column',gap:16}}>
      {/* KPI 第一排 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))',gap:12}}>
        {[
          {label:'總市值 (TWD)',  value:fmt(totalMV),   color:'var(--text)'},
          {label:'總成本 (TWD)',  value:fmt(totalCost),  color:'var(--text2)'},
          {label:'總損益（未實現）',  value:`${pnlSign(totalPnL)}${fmt(totalPnL)}`, color:pnlColor(totalPnL)},
          {label:'整體報酬', value:`${pnlSign(totalROI)}${totalROI.toFixed(2)}%`, color:pnlColor(totalROI), sub:`共 ${investments.length} 筆`},
        ].map(k=>(
          <Card key={k.label}>
            <p style={{fontSize:11,color:'var(--text3)',marginBottom:5}}>{k.label}</p>
            <div style={{fontSize:20,fontWeight:700,fontFamily:'var(--mono)',color:k.color,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{k.value}</div>
            {k.sub&&<div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>{k.sub}</div>}
          </Card>
        ))}
      </div>

      {/* KPI 第二排：借貸 / 帳戶現金 / 投資淨利 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(260px, 1fr))',gap:12}}>
        {[
          {label:'借貸總額',
           value:fmt(借貸總額),
           color:'var(--red)',
           sub:'國泰信貸3.93% + 5.24%'},
          {label:'投資帳戶現金',
           value:fmt(投資帳戶現金),
           color:'var(--accent)',
           sub:'808 + 未交割（台）+ 未交割（美）'},
          {label:'投資淨利',
           value:`${pnlSign(投資淨利)}${fmt(Math.abs(投資淨利))}`,
           color:pnlColor(投資淨利),
           sub:'總成本 + 帳戶現金 − 借貸總額'},
        ].map(k=>(
          <Card key={k.label} style={{borderLeft:`3px solid ${k.color}`}}>
            <p style={{fontSize:11,color:'var(--text3)',marginBottom:5}}>{k.label}</p>
            <div style={{fontSize:22,fontWeight:700,fontFamily:'var(--mono)',color:k.color,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{k.value}</div>
            <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>{k.sub}</div>
          </Card>
        ))}
      </div>

      {/* Pie + Groups */}
      <div style={{display:'grid',gridTemplateColumns:'260px 1fr',gap:16,alignItems:'start'}}>
        {/* Left: Pie + FX Rate */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Card>
            <p style={{fontSize:13,fontWeight:600,marginBottom:14}}>配置分佈</p>
            <div style={{display:'flex',justifyContent:'center',marginBottom:16}}><PieChart data={byCategory} size={140}/></div>
            {byCategory.map(d=>(
              <div key={d.label} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:8,height:8,borderRadius:'50%',background:d.color}}/><span style={{fontSize:12,color:'var(--text2)'}}>{d.label}</span></div>
                  <div style={{display:'flex',gap:8}}><span style={{fontSize:12,color:'var(--text3)'}}>{totalMV>0?((d.value/totalMV)*100).toFixed(0):0}%</span><span style={{fontSize:12,fontFamily:'var(--mono)',fontWeight:600}}>{fmt(d.value)}</span></div>
                </div>
                <div style={{height:5,background:'var(--surface2)',borderRadius:3,overflow:'hidden'}}><div style={{width:`${totalMV>0?(d.value/totalMV*100):0}%`,height:'100%',background:d.color,borderRadius:3}}/></div>
              </div>
            ))}
          </Card>

          {/* 投資淨利趨勢（縮小） */}
          {(()=>{
            const first=pnlHistory[0].value, last=pnlHistory[pnlHistory.length-1].value;
            const diff=last-first, pct=first!==0?(diff/Math.abs(first)*100):0;
            const mn=Math.min(...pnlHistory.map(d=>d.value)), mx=Math.max(...pnlHistory.map(d=>d.value));
            return (
              <Card>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:8}}>
                  <div>
                    <p style={{fontSize:11,fontWeight:600,color:'var(--text2)',marginBottom:3}}>投資淨利趨勢（近 12 週）</p>
                    <div style={{fontSize:16,fontWeight:700,fontFamily:'var(--mono)',color:last>=0?'var(--red)':'var(--green)'}}>{last>=0?'+':''}{fmt(last)}</div>
                    <div style={{fontSize:11,fontFamily:'var(--mono)',color:diff>=0?'var(--red)':'var(--green)',marginTop:2}}>
                      {diff>=0?'+':''}{fmt(diff)}（{diff>=0?'+':''}{pct.toFixed(1)}%）12週前
                    </div>
                  </div>
                  <div style={{textAlign:'right',fontSize:10,color:'var(--text3)',lineHeight:1.8}}>
                    <div>最高 <span style={{fontFamily:'var(--mono)',color:'var(--text2)'}}>{fmt(mx)}</span></div>
                    <div>最低 <span style={{fontFamily:'var(--mono)',color:'var(--text2)'}}>{fmt(mn)}</span></div>
                  </div>
                </div>
                <LineChart data={pnlHistory} height={72}/>
              </Card>
            );
          })()}

          {/* USD/TWD FX Rate Card */}
          <Card style={{background:'oklch(95% 0.04 240)',border:'1px solid oklch(82% 0.08 240)'}}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
              <span style={{fontSize:14}}>🇺🇸</span>
              <span style={{fontSize:12,fontWeight:600,color:'oklch(35% 0.1 240)'}}>USD / TWD 匯率</span>
            </div>
            {editingFx
              ? <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  <AmountInput value={fxInput} onChange={e=>setFxInput(e.target.value)}
                    style={{...inputSt, flex:1, fontSize:16, fontWeight:700, fontFamily:'var(--mono)', padding:'6px 10px'}}/>
                  <button onClick={()=>{ const v=parseFloat(fxInput); if(v>0){setFxRate(v);} setEditingFx(false); }}
                    style={{padding:'6px 12px',borderRadius:7,border:'none',cursor:'pointer',background:'oklch(45% 0.14 240)',color:'white',fontWeight:600,fontSize:12}}>確認</button>
                  <button onClick={()=>setEditingFx(false)}
                    style={{padding:'6px 10px',borderRadius:7,border:'1px solid var(--border)',cursor:'pointer',background:'var(--surface)',color:'var(--text2)',fontSize:12}}>✕</button>
                </div>
              : <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:20,fontWeight:700,fontFamily:'var(--mono)',color:'oklch(30% 0.12 240)'}}>
                    {fxRate.toFixed(2)}
                  </span>
                  <span style={{fontSize:11,color:'oklch(50% 0.08 240)'}}>TWD / 1 USD</span>
                  <div style={{flex:1}}/>
                  <button onClick={()=>{setFxInput(String(fxRate));setEditingFx(true);}}
                    style={{padding:'3px 8px',borderRadius:6,border:'1px solid oklch(75% 0.08 240)',cursor:'pointer',background:'white',color:'oklch(40% 0.1 240)',fontSize:11}}>手動</button>
                  <button onClick={refreshFx} disabled={fxFetching}
                    style={{padding:'3px 8px',borderRadius:6,border:'none',cursor:'pointer',background:'oklch(45% 0.14 240)',color:'white',fontSize:11}}>
                    {fxFetching?'更新中…':'↻ 更新'}
                  </button>
                </div>
            }
          </Card>
        </div>

        {/* Right: grouped sections */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              <span style={{fontSize:13,fontWeight:600}}>持倉列表</span>
              <span style={{fontSize:11,color:'var(--text3)'}}>排序：</span>
              {[['value','市值'],['pnl','損益'],['roi','報酬率']].map(([k,l])=>(
                <button key={k} onClick={()=>setSortBy(k)} style={{padding:'3px 10px',borderRadius:6,border:'1px solid var(--border)',cursor:'pointer',fontSize:11,
                  background:sortBy===k?'var(--text)':'var(--surface)',color:sortBy===k?'white':'var(--text2)'}}>{l}</button>
              ))}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              {lastPriceAt&&<span style={{fontSize:11,color:'var(--text3)'}}>更新於 {lastPriceAt}</span>}
              <button onClick={refreshPrices} disabled={priceRefreshing} style={{padding:'7px 12px',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer',fontSize:12,background:'var(--surface)',fontWeight:500}}>
                {priceRefreshing?'更新中…':'↻ 更新現價'}
              </button>
              <button onClick={onAdd} style={{padding:'7px 14px',borderRadius:8,border:'none',cursor:'pointer',fontSize:12,background:'var(--text)',color:'white',fontWeight:500}}>+ 新增持倉</button>
            </div>
          </div>

          {investments.length===0&&<Card><p style={{textAlign:'center',color:'var(--text3)',padding:'24px 0'}}>尚無持倉，點右上角新增</p></Card>}

          {GROUPS.map(g=>{
            const items = sorted.filter(i=>g.cats.includes(i.category));
            if(!items.length) return null;
            const gMV   = items.reduce((s,i)=>s+i.mv,0);
            const gPnL  = items.reduce((s,i)=>s+i.pnl,0);
            const gCost = items.reduce((s,i)=>s+i.cost,0);
            const gROI  = gCost>0?(gPnL/gCost)*100:0;
            const isUs  = g.id === 'us';
            return (
              <Card key={g.id} style={{padding:0,overflow:'hidden'}}>
                {/* Group header */}
                <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 18px',background:'var(--surface2)',borderBottom:'1px solid var(--border)'}}>
                  <span style={{fontSize:15}}>{g.icon}</span>
                  <span style={{fontWeight:700,fontSize:13,color:g.color}}>{g.label}</span>
                  <span style={{fontSize:11,color:'var(--text3)',marginLeft:2}}>{items.length} 筆</span>
                  {isUs&&<span style={{fontSize:10,color:'oklch(50% 0.1 240)',background:'oklch(93% 0.04 240)',padding:'1px 6px',borderRadius:4}}>1 USD = {fxRate} TWD</span>}
                  <div style={{flex:1}}/>
                  <span style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:600}}>{fmt(gMV)}</span>
                  <span style={{fontFamily:'var(--mono)',fontSize:12,color:pnlColor(gPnL),minWidth:90,textAlign:'right'}}>{pnlSign(gPnL)}{fmt(gPnL)} ({pnlSign(gROI)}{gROI.toFixed(1)}%)</span>
                </div>
                <ColHeader isUs={isUs}/>
                {items.map(inv=><InvRow key={inv.id} inv={inv}/>)}
              </Card>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function DataModal({db, onImport, onMerge, onClose}) {
  const [pending, setPending] = React.useState(null);
  const handleExport = () => {
    const data = JSON.stringify(db, null, 2);
    const blob = new Blob([data], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `泓金龜備份_${today()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  const handleImport = (e) => {
    const f = e.target.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        let data = JSON.parse(ev.target.result);
        if (Array.isArray(data)) data = { transactions: data };
        const hasAny = data.transactions||data.assets||data.liabilities||data.investments||data.assetHistory;
        if(!hasAny) throw new Error('找不到任何可匯入的資料欄位');
        const parts = [
          data.assets       ?`資產 ${data.assets.length} 筆`      :'',
          data.liabilities  ?`負債 ${data.liabilities.length} 筆` :'',
          data.transactions ?`交易 ${data.transactions.length} 筆`:'',
          data.investments  ?`投資 ${data.investments.length} 筆` :'',
        ].filter(Boolean).join('、');
        setPending({data, parts: parts||'（格式正確，但無資料）'});
      } catch(e) { showToast(`匯入失敗：${e.message||'檔案格式錯誤'}`, 'error'); }
    };
    r.readAsText(f);
    e.target.value='';
  };
  return (
    <Modal title="資料管理 (JSON)" onClose={onClose}>
      {pending&&(
        <div style={{marginBottom:16,padding:16,borderRadius:12,border:'2px solid var(--accent)',background:'var(--surface2)'}}>
          <p style={{fontWeight:600,fontSize:13,marginBottom:6}}>📂 選擇匯入方式</p>
          <p style={{fontSize:12,color:'var(--text2)',marginBottom:12}}>{pending.parts}</p>
          <div style={{display:'flex',gap:8}}>
            <button style={{...btnSt(false),flex:1,fontSize:12}} onClick={()=>{ onMerge(pending.data); setPending(null); onClose(); }}>
              🔀 合併<br/><span style={{fontSize:10,fontWeight:400,color:'var(--text3)'}}>保留現有＋加入新資料</span>
            </button>
            <button style={{...btnSt(true),flex:1,fontSize:12,background:'var(--red)'}} onClick={()=>{ if(confirm('確定覆蓋所有現有資料？')){onImport(pending.data);setPending(null);onClose();} }}>
              ⚠️ 覆蓋<br/><span style={{fontSize:10,fontWeight:400}}>取代所有現有資料</span>
            </button>
          </div>
          <button style={{...btnSt(false),width:'100%',marginTop:8,fontSize:12}} onClick={()=>setPending(null)}>取消</button>
        </div>
      )}
      <Card style={{marginBottom:16, borderStyle:'dashed', background:'var(--surface2)'}}>
        <p style={{fontSize:13, fontWeight:600, marginBottom:8}}>📥 備份資料</p>
        <p style={{fontSize:12, color:'var(--text2)', marginBottom:12, lineHeight:1.5}}>將目前所有資產、負債、交易紀錄、投資組合與穩定資產打包下載。建議定期備份以防萬一。</p>
        <button style={btnSt(true)} onClick={handleExport}>下載 db.json</button>
      </Card>
      <Card style={{borderStyle:'dashed', background:'var(--surface2)', marginBottom:16}}>
        <p style={{fontSize:13, fontWeight:600, marginBottom:8}}>📤 還原資料</p>
        <p style={{fontSize:12, color:'var(--text2)', marginBottom:12, lineHeight:1.5}}>上傳備份檔後，可選擇「合併」（保留現有資料並加入新資料）或「覆蓋」（完整取代）。</p>
        <input type="file" accept=".json" onChange={handleImport} style={{display:'none'}} id="import-json"/>
        <button style={btnSt(false)} onClick={()=>document.getElementById('import-json').click()}>上傳 db.json</button>
      </Card>
      <Card style={{borderStyle:'dashed', background:'var(--red-bg)', borderColor:'var(--red)'}}>
        <p style={{fontSize:13, fontWeight:600, color:'var(--red)', marginBottom:8}}>⚡ 強制重新整理</p>
        <p style={{fontSize:12, color:'var(--text2)', marginBottom:12, lineHeight:1.5}}>若您修改了 HTML 原始碼中的資料卻不見效，請使用此功能清除快取，並從原始碼重新載入。</p>
        <button style={{...btnSt(true), background:'var(--red)'}} onClick={() => {
          if (confirm('確定要清除瀏覽器快取並從網頁原始碼載入資料嗎？\n這將覆蓋您目前在網頁上「手動新增」但尚未寫入原始碼的資料。')) {
            localStorage.clear();
            location.reload();
          }
        }}>清除快取並從檔案載入</button>
      </Card>
      <p style={{fontSize:11, color:'var(--text3)', marginTop:16, textAlign:'center'}}>資料儲存在瀏覽器本地，不會上傳至雲端。</p>
    </Modal>
  );
}

// ── Migrate Stocks Modal ──────────────────────────────────────────────────────
function MigrateStocksModal({assets, fxRate, onMigrate, onClose}) {
  // 解析資產資料，自動產生投資組合草稿
  const parse = (a) => {
    const tickerM = a.name.match(/\(([^)]+)\)$/);
    const ticker  = tickerM ? tickerM[1] : '';
    const base    = a.name.replace(/\s*\([^)]+\)$/, '').trim();
    const qtyM    = a.note.match(/^([\d.]+)股/);
    const qty     = qtyM ? parseFloat(qtyM[1]) : 1;
    const isUs    = a.note.includes('USD');
    const usdM    = a.note.match(/USD\s*([\d.]+)/);
    const usdTotal= usdM ? parseFloat(usdM[1]) : null;

    let category;
    if (isUs) category = 'us_stock';
    else if (a.name.includes('ETF') || a.name.includes('基金') || /^00\d/.test(ticker)) category = 'etf';
    else category = 'tw_stock';

    let costPrice, currentPrice, usdCostPrice, usdCurrentPrice;
    if (isUs && usdTotal && qty > 0) {
      usdCurrentPrice = parseFloat((usdTotal / qty).toFixed(2));
      usdCostPrice    = usdCurrentPrice;
      currentPrice    = parseFloat((usdCurrentPrice * fxRate).toFixed(0));
      costPrice       = currentPrice;
    } else {
      currentPrice = qty > 0 ? parseFloat((a.amount / qty).toFixed(2)) : a.amount;
      costPrice    = currentPrice;
      usdCostPrice = null; usdCurrentPrice = null;
    }
    return { _assetId: a.id, name: base, ticker, category, quantity: qty, costPrice, currentPrice, usdCostPrice, usdCurrentPrice, note: '' };
  };

  const stockAssets = assets.filter(a => a.category === 'stock');
  const [rows, setRows] = React.useState(() => stockAssets.map(parse));
  const [selected, setSelected] = React.useState(() => new Set(stockAssets.map(a => a.id)));

  const toggle = id => setSelected(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const setRow = (i, k, v) => setRows(r => r.map((x, j) => j === i ? {...x, [k]: v} : x));

  const catOpts = [['tw_stock','🇹🇼 台股'],['us_stock','🇺🇸 美股'],['etf','🏛 ETF/基金'],['crypto','₿ 加密貨幣'],['fund','💼 共同基金']];

  const handleMigrate = () => {
    const toMigrate = rows.filter(r => selected.has(r._assetId));
    const assetIdsToRemove = [...selected];
    onMigrate(toMigrate, assetIdsToRemove);
  };

  const thSt = {padding:'7px 10px', textAlign:'left', fontSize:11, color:'var(--text3)', fontWeight:600, whiteSpace:'nowrap', borderBottom:'1px solid var(--border)'};
  const tdSt = {padding:'6px 8px', verticalAlign:'middle'};
  const miniInput = {fontSize:12, padding:'4px 6px', borderRadius:6, border:'1px solid var(--border)', background:'var(--surface)', width:'100%', fontFamily:'var(--mono)'};

  return (
    <Modal title="🔄 股票資產 → 投資組合" onClose={onClose} wide>
      <p style={{fontSize:12, color:'var(--text2)', marginBottom:14, lineHeight:1.6}}>
        勾選要遷移的項目，確認分類與數量後按「遷移」。<br/>
        <strong>成本均價</strong>預設等於現價（無歷史成本），可手動修改。遷移後資產列表中的對應項目將自動刪除。
      </p>
      {stockAssets.length === 0
        ? <p style={{textAlign:'center', color:'var(--text3)', padding:'24px 0'}}>資產負債中無「股票/基金」類別資料</p>
        : <div style={{overflowX:'auto', maxHeight:'55vh', overflowY:'auto'}}>
            <table style={{width:'100%', borderCollapse:'collapse', fontSize:12}}>
              <thead style={{position:'sticky', top:0, background:'var(--surface)'}}>
                <tr>
                  <th style={{...thSt, width:28}}>
                    <input type="checkbox" checked={selected.size===rows.length}
                      onChange={e => setSelected(e.target.checked ? new Set(stockAssets.map(a=>a.id)) : new Set())}/>
                  </th>
                  <th style={thSt}>名稱</th>
                  <th style={thSt}>代號</th>
                  <th style={{...thSt, width:90}}>分類</th>
                  <th style={{...thSt, width:70}}>股數</th>
                  <th style={{...thSt, width:90}}>成本均價</th>
                  <th style={{...thSt, width:90}}>現價</th>
                  <th style={{...thSt, width:100}}>市值 (TWD)</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r, i) => {
                  const a = stockAssets[i];
                  const isUs = r.category === 'us_stock';
                  const mv = r.quantity * (isUs ? r.currentPrice * fxRate : r.currentPrice);
                  const checked = selected.has(a.id);
                  return (
                    <tr key={a.id} style={{background: checked ? 'var(--surface)' : 'var(--surface2)', opacity: checked ? 1 : 0.45}}>
                      <td style={tdSt}><input type="checkbox" checked={checked} onChange={()=>toggle(a.id)}/></td>
                      <td style={tdSt}>
                        <input style={{...miniInput, width:150}} value={r.name} onChange={e=>setRow(i,'name',e.target.value)}/>
                      </td>
                      <td style={tdSt}>
                        <input style={{...miniInput, width:70}} value={r.ticker} onChange={e=>setRow(i,'ticker',e.target.value)}/>
                      </td>
                      <td style={tdSt}>
                        <select style={{...miniInput, paddingRight:2}} value={r.category} onChange={e=>setRow(i,'category',e.target.value)}>
                          {catOpts.map(([k,l])=><option key={k} value={k}>{l}</option>)}
                        </select>
                      </td>
                      <td style={tdSt}>
                        <AmountInput style={miniInput} value={r.quantity} onChange={e=>setRow(i,'quantity',parseFloat(e.target.value)||0)}/>
                      </td>
                      <td style={tdSt}>
                        <div style={{display:'flex',alignItems:'center',gap:2}}>
                          {isUs&&<span style={{fontSize:10,color:'var(--text3)'}}>$</span>}
                          <AmountInput style={miniInput} value={isUs ? (r.usdCostPrice||'') : r.costPrice}
                            onChange={e=>{const v=parseFloat(e.target.value)||0; isUs?setRow(i,'usdCostPrice',v):setRow(i,'costPrice',v);}}/>
                        </div>
                      </td>
                      <td style={tdSt}>
                        <div style={{display:'flex',alignItems:'center',gap:2}}>
                          {isUs&&<span style={{fontSize:10,color:'var(--text3)'}}>$</span>}
                          <AmountInput style={miniInput} value={isUs ? (r.usdCurrentPrice||'') : r.currentPrice}
                            onChange={e=>{const v=parseFloat(e.target.value)||0; isUs?setRow(i,'usdCurrentPrice',v):setRow(i,'currentPrice',v);}}/>
                        </div>
                      </td>
                      <td style={{...tdSt, fontFamily:'var(--mono)', textAlign:'right', fontWeight:600, color:'var(--text2)', fontSize:11}}>
                        {new Intl.NumberFormat('zh-TW',{style:'currency',currency:'TWD',maximumFractionDigits:0}).format(isUs ? r.quantity*(r.usdCurrentPrice||0)*fxRate : r.quantity*(r.currentPrice||0))}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
      }
      <div style={{display:'flex', gap:10, marginTop:16, alignItems:'center'}}>
        <span style={{fontSize:12, color:'var(--text3)', flex:1}}>已選 {selected.size} / {rows.length} 筆</span>
        <button style={btnSt(false)} onClick={onClose}>取消</button>
        <button style={{...btnSt(true), minWidth:100}} disabled={selected.size===0} onClick={handleMigrate}>
          ✅ 遷移 {selected.size} 筆
        </button>
      </div>
    </Modal>
  );
}

function App() {
  const [tab, setTab] = useState('dashboard');
  const [assets, setAssets] = useState(()=>loadLS('hj_assets',INIT_ASSETS));
  const [liabilities, setLiabilities] = useState(()=>loadLS('hj_liabilities',INIT_LIABILITIES));
  const [transactions, setTransactions] = useState(()=>loadLS('hj_transactions',INIT_TRANSACTIONS));
  const [investments, setInvestments] = useState(()=>loadLS('hj_investments',INIT_INVESTMENTS));
  const [stableAssets, setStableAssets] = useState(()=>loadLS('hj_stable',INIT_STABLE));
  // incomeRecords is now derived from transactions (type==='income') — no separate state needed
  const incomeRecords = React.useMemo(()=>transactions.filter(t=>t.type==='income'), [transactions]);
  const [paymentRecords, setPaymentRecords] = useState(()=>loadLS('hj_payments',INIT_PAYMENTS));
  const [recurringPayments, setRecurringPayments] = useState(()=>loadLS('hj_recurring',[]));
  const [assetHistory, setAssetHistory] = useState(()=>loadLS('hj_asset_history',INIT_ASSET_HISTORY));
  const [realizedPnl, setRealizedPnl]   = useState(()=>loadLS('hj_realized_pnl', INIT_REALIZED_PNL));
  const [fxRate, setFxRate] = useState(()=>parseFloat(localStorage.getItem('hj_fxrate'))||32);
  const [lastInvoice, setLastInvoice] = useState(()=>localStorage.getItem('hj_last_invoice')||'');
  const [carrierCode, setCarrierCode] = useState(()=>localStorage.getItem('hj_carrier')||'');
  const [showInvBanner, setShowInvBanner] = useState(()=>{ const d=localStorage.getItem('hj_last_invoice'); return !d||d!==new Date().toISOString().split('T')[0]; });
  const [modal, setModal] = useState(null);
  const [txFilter, setTxFilter] = useState('all');
  const [isHighOnly, setIsHighOnly] = useState(false);
  const [txSearch, setTxSearch] = useState('');
  const [tweakOpen, setTweakOpen] = useState(false);
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"accentHue":"200"}/*EDITMODE-END*/;

  useEffect(()=>{localStorage.setItem('hj_assets',JSON.stringify(assets));},[assets]);
  useEffect(()=>{localStorage.setItem('hj_liabilities',JSON.stringify(liabilities));},[liabilities]);
  useEffect(()=>{localStorage.setItem('hj_transactions',JSON.stringify(transactions));},[transactions]);
  useEffect(()=>{localStorage.setItem('hj_investments',JSON.stringify(investments));},[investments]);
  useEffect(()=>{localStorage.setItem('hj_stable',JSON.stringify(stableAssets));},[stableAssets]);
  // hj_income no longer used — income is stored in hj_transactions
  useEffect(()=>{localStorage.setItem('hj_payments',JSON.stringify(paymentRecords));},[paymentRecords]);
  useEffect(()=>{localStorage.setItem('hj_recurring',JSON.stringify(recurringPayments));},[recurringPayments]);
  useEffect(()=>{localStorage.setItem('hj_asset_history',JSON.stringify(assetHistory));},[assetHistory]);
  useEffect(()=>{localStorage.setItem('hj_realized_pnl',JSON.stringify(realizedPnl));},[realizedPnl]);
  useEffect(()=>{localStorage.setItem('hj_fxrate',fxRate);},[fxRate]);
  useEffect(()=>{
    // 自動抓取 USD/TWD 即時匯率
    fetch('https://open.er-api.com/v6/latest/USD')
      .then(r=>r.json())
      .then(d=>{ if(d.rates?.TWD){ const r=parseFloat(d.rates.TWD.toFixed(2)); setFxRate(r); localStorage.setItem('hj_fxrate',r); }})
      .catch(()=>{});
  },[]);
  useEffect(()=>{
    window.addEventListener('message',e=>{
      if(e.data?.type==='__activate_edit_mode') setTweakOpen(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweakOpen(false);
    });
    window.parent.postMessage({type:'__edit_mode_available'},'*');
  },[]);

  const totalAssets = assets.reduce((s,a)=>s+a.amount,0);
  const totalLiab = liabilities.reduce((s,l)=>s+l.amount,0);
  const netWorth = totalAssets - totalLiab;
  const weeklyData = loadLS('hj_weekly',null)||(() => { const d=genWeeklyData(netWorth); localStorage.setItem('hj_weekly',JSON.stringify(d)); return d; })();

  function genWeeklyData(base) {
    const pts=[]; let v=base*0.88;
    for(let i=7;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i*7); v+=(Math.random()-0.35)*base*0.03; pts.push({label:`${d.getMonth()+1}/${d.getDate()}`,value:Math.round(v)}); }
    return pts;
  }

  const assetsByCategory = ['cash','stock','fund','crypto'].map(c=>({label:CAT_META[c].label,color:CAT_META[c].color,icon:CAT_META[c].icon,value:assets.filter(a=>a.category===c).reduce((s,a)=>s+a.amount,0)})).filter(d=>d.value>0);
  const dashNowStr = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
  const monthIncome = incomeRecords.filter(r=>r.date.startsWith(dashNowStr)).reduce((s,r)=>s+r.amount,0);
  const monthExpense = paymentRecords.filter(r=>r.date.startsWith(dashNowStr)).reduce((s,r)=>s+r.amount,0);
  const prevWeekNet = weeklyData.length>1?weeklyData[weeklyData.length-2].value:netWorth;

  const barData = Array.from({length:6},(_,i)=>{
    const d=new Date(new Date().getFullYear(),new Date().getMonth()-5+i,1);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    return {
      label:`${d.getMonth()+1}月`,
      income:incomeRecords.filter(r=>r.date.startsWith(key)).reduce((s,r)=>s+r.amount,0),
      expense:paymentRecords.filter(r=>r.date.startsWith(key)).reduce((s,r)=>s+r.amount,0)
    };
  });
  const maxBar = Math.max(...barData.map(d=>Math.max(d.income,d.expense)),1);

  // Dashboard derived data
  const savingsRate = monthIncome > 0 ? (monthIncome - monthExpense) / monthIncome * 100 : 0;
  const invSummary = React.useMemo(()=>{
    let mv=0, cost=0;
    investments.forEach(inv=>{
      const qty=parseFloat(inv.quantity)||0;
      let twdCost,twdCurr;
      if(inv.category==='us_stock'){
        const uc=parseFloat(inv.usdCostPrice!=null?inv.usdCostPrice:inv.costPrice)||0;
        const ur=parseFloat(inv.usdCurrentPrice!=null?inv.usdCurrentPrice:inv.currentPrice)||0;
        twdCost=uc*fxRate; twdCurr=ur*fxRate;
      } else { twdCost=parseFloat(inv.costPrice)||0; twdCurr=parseFloat(inv.currentPrice)||0; }
      mv+=qty*twdCurr; cost+=qty*twdCost;
    });
    const pnl=mv-cost;
    return {mv,cost,pnl,roi:cost>0?pnl/cost*100:0};
  },[investments,fxRate]);
  const stableYield = stableAssets.filter(s=>s.rate>0).reduce((sum,s)=>sum+s.amount*(s.rate/100),0);
  const stableAssetCats = ['bank_cash','bank_deposit','pinebridge'];
  const stableLiabCats  = ['private_lending','credit_installment'];
  const stableTotalPos  = stableAssets.filter(s=>stableAssetCats.includes(s.category)).reduce((sum,s)=>sum+s.amount,0);
  const stableTotalNeg  = stableAssets.filter(s=>stableLiabCats.includes(s.category)).reduce((sum,s)=>sum+s.amount,0);
  const stableNet       = stableTotalPos - stableTotalNeg;
  // (Removed pending payments variables)

  const saveAsset = (item, isLiab) => {
    const d = today();
    const withDate = {...item, updatedAt: d};
    const list = isLiab ? liabilities : assets;
    const existing = item.id ? list.find(x=>x.id===item.id) : null;
    const amountChanged = !existing || existing.amount !== item.amount;
    if(isLiab) setLiabilities(l=>item.id?l.map(x=>x.id===item.id?withDate:x):[...l,{...withDate,id:Date.now()}]);
    else setAssets(a=>item.id?a.map(x=>x.id===item.id?withDate:x):[...a,{...withDate,id:Date.now()}]);
    if(amountChanged) {
      const assetId = item.id || Date.now();
      setAssetHistory(h=>[...h,{id:Date.now()+1, assetId, isLiab, name:item.name, amount:item.amount, date:d}]);
    }
    setModal(null);
    showToast(item.id ? '✅ 已更新' : '✅ 已新增');
  };
  const delAsset = (id, isLiab) => { if(isLiab) setLiabilities(l=>l.filter(x=>x.id!==id)); else setAssets(a=>a.filter(x=>x.id!==id)); showToast('🗑 已刪除', 'warning'); };

    const mergeArr = (existing, incoming) => {
      if (!incoming) return existing;
      const map = new Map(existing.map(x=>[x.id,x]));
      incoming.forEach(x=>{ if(!map.has(x.id)) map.set(x.id,x); });
      return [...map.values()];
    };
    if(data.assets)       setAssets(a=>mergeArr(a, data.assets));
    if(data.liabilities)  setLiabilities(l=>mergeArr(l, data.liabilities));
    if(data.transactions) setTransactions(t=>mergeArr(t, data.transactions));
    if(data.assetHistory) setAssetHistory(h=>mergeArr(h, data.assetHistory));
    if(data.investments)  setInvestments(i=>mergeArr(i, data.investments));
    if(data.realizedPnl)  setRealizedPnl(p=>mergeArr(p, data.realizedPnl));
    showToast('✅ 資料已合併完成');
  };

    if(data.assets      !== undefined) setAssets(data.assets);
    if(data.liabilities !== undefined) setLiabilities(data.liabilities);
    if(data.transactions!== undefined) setTransactions(data.transactions);
    if(data.assetHistory!== undefined) setAssetHistory(data.assetHistory);

      const fixed = data.investments.map(inv => {
        if(inv.category !== 'us_stock') return inv;
        // 判斷是否已有 usdCostPrice（新格式），或 costPrice 是否已是 USD（<500 合理）
        if(inv.usdCostPrice != null) return inv;        // 新格式，直接用
        if(inv.costPrice < 1000 && inv.currentPrice < 1000) return inv; // 看起來已是 USD
        // 舊格式：costPrice 是台幣，換回 USD
        const rate = parseFloat(localStorage.getItem('hj_fxrate')) || fxRate;
        return {...inv,
          usdCostPrice:    parseFloat((inv.costPrice    / rate).toFixed(2)),
          usdCurrentPrice: parseFloat((inv.currentPrice / rate).toFixed(2)),
          costPrice:       parseFloat((inv.costPrice    / rate).toFixed(2)),
          currentPrice:    parseFloat((inv.currentPrice / rate).toFixed(2)),
